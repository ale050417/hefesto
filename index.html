  t.addEventListener('click',()=>{ clearTimeout(toastTimer[id]); t.classList.add('out'); setTimeout(()=>t.remove(),300); });
}

function openModal(html, lg=false){
  const root = $('#modal-root');
  root.innerHTML = `<div class="modal-backdrop"><div class="modal ${lg?'modal-lg':''}">${html}</div></div>`;
  const bk = $('.modal-backdrop', root);
  requestAnimationFrame(()=>bk.classList.add('open'));
  bk.addEventListener('click', e=>{ if(e.target===bk) closeModal(); });
  return root;
}
function closeModal(){
  const bk = $('.modal-backdrop'); if(!bk) return;
  bk.classList.remove('open'); setTimeout(()=>{ $('#modal-root').innerHTML=''; }, 250);
}

function openDrawer(html){
  const root = $('#drawer-root');
  root.innerHTML = `<div class="drawer-backdrop"></div><div class="drawer">${html}</div>`;
  const bk = $('.drawer-backdrop', root), dr=$('.drawer', root);
  requestAnimationFrame(()=>{ bk.classList.add('open'); dr.classList.add('open'); });
  bk.addEventListener('click', closeDrawer);
  return root;
}
function closeDrawer(){
  const bk=$('.drawer-backdrop'), dr=$('.drawer'); if(!bk) return;
  bk.classList.remove('open'); dr.classList.remove('open');
  setTimeout(()=>{ $('#drawer-root').innerHTML=''; }, 350);
}

/* ---------- theme ---------- */
const THEMES = [
  { id:'dark',  label:'Oscuro',        icon:'moon',     desc:'Fondo negro' },
  { id:'light', label:'Claro',         icon:'sun',      desc:'Fondo blanco' },
  { id:'warm',  label:'Luz nocturna',  icon:'lamp',     desc:'Cálido, descansa la vista' },
];
function themeIcon(t){ const m=THEMES.find(x=>x.id===t)||THEMES[0]; return m.icon; }
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); localStorage.setItem('hef-theme', t); }
applyTheme(localStorage.getItem('hef-theme') || 'dark');
/* aplicar acento configurado del storefront */
(function(){ if(STORE_CONFIG.season && STORE_CONFIG.season!=='none'){ applySeasonAccent(); return; } const c=STORE_CONFIG.accent; if(c && c!=='#C9A84C'){ setAccentVars(c, c); } })();
function setTheme(t){ applyTheme(t); render(); }
function toggleTheme(){ const cur=document.documentElement.getAttribute('data-theme'); const i=THEMES.findIndex(x=>x.id===cur); applyTheme(THEMES[(i+1)%THEMES.length].id); render(); }
function themeSwitcher(){
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  return `<div class="dropdown theme-dd" data-theme-dd>
    <button class="icon-btn" data-act="theme-toggle" title="Tema de la pantalla">${icon(themeIcon(cur))}</button>
    <div class="dropdown-menu theme-menu">
      <div class="theme-menu-head">Tema de la pantalla</div>
      ${THEMES.map(t=>`<button class="theme-opt ${cur===t.id?'on':''}" data-set-theme="${t.id}">
        <span class="theme-opt-ic">${icon(t.icon)}</span>
        <span class="theme-opt-txt"><b>${t.label}</b><span>${t.desc}</span></span>
        ${cur===t.id?`<span class="theme-opt-check">${icon('check')}</span>`:''}
      </button>`).join('')}
    </div>
  </div>`;
}
function wireThemeSwitchers(){
  $$('[data-theme-dd]').forEach(dd=>{
    const btn=$('[data-act="theme-toggle"]',dd);
    btn.onclick=(e)=>{ e.stopPropagation(); const open=dd.classList.contains('open'); document.querySelectorAll('.dropdown.open').forEach(d=>d.classList.remove('open')); if(!open){ dd.classList.add('open'); document.addEventListener('click',()=>dd.classList.remove('open'),{once:true}); } else dd.classList.remove('open'); };
    $$('[data-set-theme]',dd).forEach(o=>o.onclick=(e)=>{ e.stopPropagation(); setTheme(o.dataset.setTheme); });
  });
}
</script>

<script>
/* ===================================================================
   APP FRAMEWORK — header, shells, router
   =================================================================== */
const ADMIN_NAV = [
  { id:'dashboard', label:'Dashboard', icon:'dashboard', group:'Principal' },
  { id:'pedidos', label:'Pedidos', icon:'cart', group:'Ventas', badge:()=>ORDERS.filter(o=>o.status==='pendiente').length },
  { id:'medida', label:'Pedidos a medida', icon:'sparkles', group:'Ventas', badge:()=>CUSTOM_REQ.filter(r=>r.status==='nueva').length||0 },
  { id:'clientes', label:'Clientes', icon:'users', group:'Ventas' },
  { id:'produccion', label:'Cola de impresión', icon:'printer', group:'Producción', badge:()=>PRINTERS.filter(p=>p.status==='error').length||0 },
  { id:'filamentos', label:'Filamentos', icon:'layers', group:'Producción', badge:()=>FILAMENTS.filter(f=>f.stock<=f.alert).length||0 },

];

function render(){
  // invitado (sin login): puede navegar la tienda como página de inicio
  if(!Auth.user){ State.mode='store'; if(!['home','catalog','product'].includes(State.storeView)) State.storeView='home'; }
  else if(Auth.user.role==='cliente' && State.mode==='admin'){ State.mode='store'; State.storeView='home'; } // los clientes no acceden al panel
  const app = $('#app');
  app.innerHTML = header() + (State.mode==='admin' ? adminShell() : storeShell());
  wireGlobal();
  if(State.mode==='admin') wireAdmin(); else wireStore();
}

/* ===================================================================
   AUTH — login / registro
   =================================================================== */
const Auth = {
  user: JSON.parse(localStorage.getItem('hef-auth') || 'null'),
  mode: 'login', // login | register
  showPw: false,
  draft: {},
};
// Cuentas de gestión (provistas por el dueño — NO se registran solas).
// Cualquier otro email que inicie sesión entra como cliente.
const ADMIN_EMAILS = ['admin@hefesto3d.com','hola@hefesto3d.com'];
function isAdminEmail(email){ const e=(email||'').toLowerCase().trim(); return ADMIN_EMAILS.includes(e) || TEAM.some(t=>t.email.toLowerCase()===e); }
function roleForEmail(email){ return isAdminEmail(email) ? 'admin' : 'cliente'; }
function nameForEmail(email){
  const e=(email||'').toLowerCase().trim();
  const t=TEAM.find(x=>x.email.toLowerCase()===e); if(t) return t.name;
  if(roleForEmail(e)==='admin') return 'Hefesto Admin';
  const c=CUSTOMERS.find(x=>x.email.toLowerCase()===e); if(c) return c.name;
  const local=e.split('@')[0].replace(/[._]/g,' ');
  return local.replace(/\b\w/g,m=>m.toUpperCase()) || 'Cliente';
}
function login(user){
  Auth.user=user; localStorage.setItem('hef-auth', JSON.stringify(user));
  // dirigir según el tipo de cuenta
  State.mode = user.role==='cliente' ? 'store' : 'admin';
  if(user.role==='cliente'){ State.storeView='home'; } else { State.view='dashboard'; }
  localStorage.setItem('hef-mode', State.mode);
  window.scrollTo(0,0); render();
  toast('¡Bienvenido, '+user.name.split(' ')[0]+'!');
}
function logout(){ Auth.user=null; localStorage.removeItem('hef-auth'); Auth.mode='login'; window.scrollTo(0,0); render(); }
function saveAuthDraft(){ Auth.draft={}; $$('.auth-card input').forEach(i=>{ if(i.id) Auth.draft[i.id]=i.value; }); }
function restoreAuthDraft(){ Object.entries(Auth.draft).forEach(([id,v])=>{ const e=$('#'+id); if(e) e.value=v; }); }

function renderAuth(){
  $('#app').innerHTML = AuthScreen();
  wireAuth();
}

/* Login dedicado al panel de gestión (usuario + contraseña) */
function openAdminLogin(){
  const root=$('#modal-root');
  root.innerHTML=`<div class="modal-backdrop open"><div class="modal auth-modal" style="max-width:392px">
    <button class="icon-btn auth-modal-x" data-act="close">${icon('x')}</button>
    <div class="auth-modal-head">
      <div class="auth-modal-mark">${brandMark(44)}</div>
      <div class="brand-name" style="font-size:15px;margin-top:10px">${brandNameHtml()}</div>
      <div class="auth-modal-title">Panel de gestión</div>
      <div class="auth-modal-sub">Ingresá con tu usuario y contraseña</div>
    </div>
    <div class="modal-body col gap-3" style="padding-top:6px">
      <div class="field"><label>Usuario / Email</label><div class="search"><span style="left:13px">${icon('users')}</span><input class="input" id="ad-user" type="email" placeholder="admin@hefesto3d.com" style="padding-left:38px" value="admin@hefesto3d.com"/></div></div>
      <div class="field"><label>Contraseña</label><div class="auth-pw"><input class="input" id="ad-pass" type="password" placeholder="••••••••" autocomplete="current-password"/><span class="toggle-pw" data-act="ad-eye">${icon('eye')}</span></div></div>
      <div class="auth-err hide" id="ad-err">${icon('alert')}<span></span></div>
      <button class="btn btn-primary btn-block btn-lg" data-act="ad-submit" style="margin-top:2px">${icon('shield')} Ingresar al panel</button>
      <div class="auth-modal-legal">${icon('shield')} Acceso restringido al equipo de gestión</div>
    </div>
  </div></div>`;
  const bk=$('.modal-backdrop',root); bk.addEventListener('click',e=>{ if(e.target===bk) closeModal(); });
  $$('[data-act="close"]',root).forEach(b=>b.onclick=closeModal);
  const eye=$('[data-act="ad-eye"]',root); if(eye) eye.onclick=()=>{ const p=$('#ad-pass',root); p.type=p.type==='password'?'text':'password'; };
  const submit=()=>{
    const email=$('#ad-user',root).value.trim(), pass=$('#ad-pass',root).value;
    const err=$('#ad-err',root); const fail=(m)=>{ err.classList.remove('hide'); err.querySelector('span').textContent=m; };
    if(!/.+@.+\..+/.test(email)) return fail('Ingresá un usuario válido');
    if(!pass) return fail('Ingresá tu contraseña');
    if(roleForEmail(email)!=='admin') return fail('Esa cuenta no tiene acceso al panel');
    closeModal(); login({name:nameForEmail(email), email, biz:'Hefesto 3D', role:'admin'});
  };
  $('[data-act="ad-submit"]',root).onclick=submit;
  $('#ad-pass',root).onkeydown=(e)=>{ if(e.key==='Enter') submit(); };
}

/* Modal de login para invitados (al comprar). Google / Facebook / registro */
function requireLogin(onSuccess){
  if(Auth.user){ onSuccess&&onSuccess(); return; }
  Auth._pending = onSuccess || null;
  let mode='login';
  const draw=()=>{
    const root=$('#modal-root');
    root.innerHTML=`<div class="modal-backdrop open"><div class="modal auth-modal" style="max-width:412px">
      <button class="icon-btn auth-modal-x" data-act="close">${icon('x')}</button>
      <div class="auth-modal-head">
        <div class="auth-modal-mark">${brandMark(44)}</div>
        <div class="brand-name" style="font-size:15px;margin-top:10px">${brandNameHtml()}</div>
        <div class="auth-modal-title">${mode==='login'?'Bienvenido de vuelta':'Creá tu cuenta'}</div>
        <div class="auth-modal-sub">${mode==='login'?'Ingresá para finalizar tu compra':'Registrate en segundos y seguí comprando'}</div>
      </div>
      <div class="modal-body col gap-3" style="padding-top:6px">
        ${mode==='register'?`<div class="field"><label>Nombre y apellido</label><input class="input" id="lg-name" placeholder="Tu nombre"/></div>`:''}
        <div class="field"><label>Email</label><div class="search"><span style="left:13px">${icon('users')}</span><input class="input" id="lg-email" type="email" placeholder="vos@email.com" style="padding-left:38px"/></div></div>
        <div class="field"><label>Contraseña</label><div class="auth-pw"><input class="input" id="lg-pass" type="password" placeholder="••••••••" autocomplete="${mode==='login'?'current-password':'new-password'}"/><span class="toggle-pw" data-act="lg-eye">${icon('eye')}</span></div></div>
        ${mode==='register'?`
        <div id="lg-rules" class="pw-rules">
          <div class="pw-meter" style="margin-bottom:10px"><div id="lg-meter"></div></div>
          ${[['len','Mínimo 8 caracteres'],['upper','Una mayúscula'],['num','Un número'],['sym','Un símbolo (!@#...)']].map(([k,t])=>`<div class="pw-rule" data-rule="${k}"><span class="pw-rule-ic">${icon('check')}</span>${t}</div>`).join('')}
        </div>
        <div class="field"><label>Confirmar contraseña</label><div class="auth-pw"><input class="input" id="lg-pass2" type="password" placeholder="Repetí la contraseña" autocomplete="new-password"/><span class="pw-match" id="lg-match"></span></div></div>
        `:`<div class="row between" style="font-size:12.5px"><span></span><a data-act="lg-forgot" style="color:var(--gold-bright);cursor:pointer">¿Olvidaste tu contraseña?</a></div>`}
        <div class="auth-err hide" id="lg-err">${icon('alert')}<span></span></div>
        <button class="btn btn-primary btn-block btn-lg" data-act="lg-submit" style="margin-top:2px">${icon(mode==='login'?'logout':'sparkles')} ${mode==='login'?'Ingresar y comprar':'Crear cuenta'}</button>
        <div class="auth-foot">${mode==='login'?'¿No tenés cuenta? <a data-act="lg-toreg">Registrate gratis</a>':'¿Ya tenés cuenta? <a data-act="lg-tologin">Iniciá sesión</a>'}</div>
        <div class="auth-divider">o continuá con</div>
        <div class="auth-social-round">
          <button class="social-round" data-act="social-google" title="Continuar con Google">${gLogo()}</button>
          <button class="social-round social-fb" data-act="social-fb" title="Continuar con Facebook">f</button>
        </div>
        <div class="auth-modal-legal">${icon('shield')} Tus datos están protegidos · Hefesto 3D</div>
      </div>
    </div></div>`;
    const bk=$('.modal-backdrop',root); bk.addEventListener('click',e=>{ if(e.target===bk) closeModal(); });
    $$('[data-act="close"]',root).forEach(b=>b.onclick=closeModal);
    const eye=$('[data-act="lg-eye"]',root); if(eye) eye.onclick=()=>{ const p=$('#lg-pass',root); p.type=p.type==='password'?'text':'password'; };
    const finish=(user)=>{ closeModal(); login(user); const cb=Auth._pending; Auth._pending=null; if(cb) setTimeout(cb,60); };
    $('[data-act="social-google"]',root).onclick=()=>finish({name:'Cliente Google', email:'cliente@gmail.com', role:'cliente'});
    $('[data-act="social-fb"]',root).onclick=()=>finish({name:'Cliente Facebook', email:'cliente@facebook.com', role:'cliente'});
    const tr=$('[data-act="lg-toreg"]',root); if(tr) tr.onclick=()=>{ mode='register'; draw(); };
    const tl=$('[data-act="lg-tologin"]',root); if(tl) tl.onclick=()=>{ mode='login'; draw(); };
    const fg=$('[data-act="lg-forgot"]',root); if(fg) fg.onclick=()=>toast('Te enviamos un email para restablecer tu contraseña');

    // reglas de contraseña en vivo (registro)
    const pwChecks=(v)=>({ len:v.length>=8, upper:/[A-Z]/.test(v), num:/[0-9]/.test(v), sym:/[^A-Za-z0-9]/.test(v) });
    const pwValid=(v)=>{ const c=pwChecks(v); return c.len&&c.upper&&c.num&&c.sym; };
    if(mode==='register'){
      const pass=$('#lg-pass',root), pass2=$('#lg-pass2',root);
      const refresh=()=>{
        const v=pass.value, c=pwChecks(v);
        Object.entries(c).forEach(([k,ok])=>{ const el=$(`[data-rule="${k}"]`,root); if(el) el.classList.toggle('ok',ok); });
        const score=Object.values(c).filter(Boolean).length;
        const m=$('#lg-meter',root); m.style.width=(score*25)+'%'; m.style.background=['','#D96A5A','#D9A441','#5A9CD9','#4CB782'][score];
        const mt=$('#lg-match',root);
        if(pass2.value){ const same=pass2.value===v; mt.textContent=same?'✓ Coinciden':'✗ No coinciden'; mt.className='pw-match '+(same?'ok':'bad'); } else { mt.textContent=''; mt.className='pw-match'; }
      };
      pass.oninput=refresh; pass2.oninput=refresh;
    }

    $('[data-act="lg-submit"]',root).onclick=()=>{
      const email=$('#lg-email',root).value.trim(), pass=$('#lg-pass',root).value, name=mode==='register'?$('#lg-name',root).value.trim():'';
      const err=$('#lg-err',root); const fail=(m)=>{ err.classList.remove('hide'); err.querySelector('span').textContent=m; };
      if(mode==='register'&&!name) return fail('Ingresá tu nombre');
      if(!/.+@.+\..+/.test(email)) return fail('Ingresá un email válido');
      // admin entra siempre (cuenta de gestión existente)
      if(mode==='login' && roleForEmail(email)==='admin'){ if(!pass) return fail('Ingresá tu contraseña'); finish({name:nameForEmail(email), email, biz:'Hefesto 3D', role:'admin'}); return; }
      if(mode==='register'){
        if(!pwValid(pass)) return fail('La contraseña no cumple los requisitos de seguridad');
        if($('#lg-pass2',root).value!==pass) return fail('Las contraseñas no coinciden');
        if(roleForEmail(email)==='admin') return fail('Ese email pertenece a una cuenta de gestión');
      } else {
        if(pass.length<4) return fail('Ingresá tu contraseña');
      }
      finish({name:name||nameForEmail(email), email, role:'cliente'});
    };
  };
  draw();
}

function wireAuth(){

  $$('[data-toggle-pw]').forEach(t=>t.onclick=()=>{ const inp=$('#'+t.dataset.togglePw); inp.type=inp.type==='password'?'text':'password'; });

  const rem=$('#li-remember'); if(rem) rem.onclick=function(){ this.classList.toggle('on'); this.innerHTML=this.classList.contains('on')?icon('check'):''; };
  const terms=$('#rg-terms'); if(terms) terms.onclick=function(){ this.classList.toggle('on'); this.innerHTML=this.classList.contains('on')?icon('check'):''; };

  $$('[data-act="demo-client"]').forEach(b=>b.onclick=()=>login({name:'Martina Acosta', email:'martina.acosta@gmail.com', role:'cliente'}));

  const pass=$('#rg-pass'); if(pass) pass.oninput=()=>{
    const v=pass.value, m=$('#rg-meter');
    let s=0; if(v.length>=6)s++; if(/[A-Z]/.test(v)||/[0-9]/.test(v))s++; if(v.length>=10&&/[^a-zA-Z0-9]/.test(v))s++;
    const w=[0,40,70,100][s], c=['','#D96A5A','#D9A441','#4CB782'][s];
    m.style.width=w+'%'; m.style.background=c;
  };

  const lf=$('#login-form'); if(lf) lf.onsubmit=(e)=>{
    e.preventDefault();
    const email=$('#li-email').value.trim(), pw=$('#li-pass').value;
    const err=$('#li-err');
    if(!email||!pw){ err.classList.remove('hide'); err.querySelector('span').textContent='Completá email y contraseña'; return; }
    if(!/.+@.+\..+/.test(email)){ err.classList.remove('hide'); err.querySelector('span').textContent='Ingresá un email válido'; return; }
    // el sistema detecta solo si es cuenta de gestión o de cliente
    const role=roleForEmail(email);
    login(role==='admin' ? {name:nameForEmail(email), email, biz:'Hefesto 3D', role} : {name:nameForEmail(email), email, role});
  };
  const rf=$('#reg-form'); if(rf) rf.onsubmit=(e)=>{
    e.preventDefault();
    const name=$('#rg-name').value.trim(), email=$('#rg-email').value.trim(), pw=$('#rg-pass').value;
    const phone=$('#rg-phone')?$('#rg-phone').value.trim():'';
    const err=$('#rg-err');
    const fail=(m)=>{ err.classList.remove('hide'); err.querySelector('span').textContent=m; };
    if(!name||!email||!pw){ return fail('Completá todos los campos'); }
    if(!/.+@.+\..+/.test(email)){ return fail('Ingresá un email válido'); }
    if(pw.length<6){ return fail('La contraseña debe tener al menos 6 caracteres'); }
    if(roleForEmail(email)==='admin'){ return fail('Ese email pertenece a una cuenta de gestión. Iniciá sesión.'); }
    if(!$('#rg-terms').classList.contains('on')){ return fail('Aceptá los términos para continuar'); }
    // el registro siempre crea una cuenta de cliente
    login({name, email, phone, role:'cliente'});
  };
}

function storeSearchResultsHtml(q){
  const res=searchProducts(q, 6);
  if(!res.length) return `<div class="ss-empty">${icon('search')}<div>Sin resultados para "<b>${q}</b>"</div><div class="ss-empty-sub">Probá con otra palabra o revisá la ortografía.</div></div>`;
  const cats=[...new Set(res.map(p=>p.cat))].slice(0,3);
  return `
    <div class="ss-group">Productos</div>
    ${res.map(p=>{ const off=p.sale?Math.round((1-p.sale/p.price)*100):0; return `<div class="ss-item" data-ss-prod="${p.id}">
      <div class="ss-thumb ph" data-label=""></div>
      <div class="ss-meta"><div class="ss-name">${hl(p.name,q)}</div><div class="ss-sub">${getCat(p.cat).name} · ${p.material}</div></div>
      <div class="ss-price">${p.sale?`<b style="color:var(--gold-bright)">${fmt(p.sale)}</b>`:`<b>${fmt(p.price)}</b>`}${off?`<span class="ss-off">-${off}%</span>`:''}</div>
    </div>`;}).join('')}
    ${cats.length?`<div class="ss-group">Categorías</div><div class="ss-cats">${cats.map(c=>`<button class="ss-cat" data-ss-cat="${c}">${icon(getCat(c).icon)} ${getCat(c).name}</button>`).join('')}</div>`:''}
    <button class="ss-all" data-ss-all>${icon('search')} Ver todos los resultados para "${q}" ${icon('arrowRight')}</button>
  `;
}
function hl(text, q){
  const terms=normTxt(q).trim().split(/\s+/).filter(Boolean);
  if(!terms.length) return text;
  let out=text;
  // resalta la primera coincidencia de cada término (insensible a acentos, sobre el texto original)
  const ntext=normTxt(text);
  const ranges=[];
  terms.forEach(t=>{ const i=ntext.indexOf(t); if(i>=0) ranges.push([i,i+t.length]); });
  if(!ranges.length) return text;
  ranges.sort((a,b)=>a[0]-b[0]);
  let result='', last=0;
  ranges.forEach(([s,e])=>{ if(s<last) return; result+=text.slice(last,s)+'<mark>'+text.slice(s,e)+'</mark>'; last=e; });
  result+=text.slice(last);
  return result;
}

function wireStoreSearch(){
  const input=$('#store-search-input');
  const box=$('#ss-results');
  const wrap=$('#store-search');
  const clearBtn=$('[data-act="ss-clear"]');
  const closeResults=()=>{ if(box) box.classList.remove('open'); };
  const showResults=(q)=>{
    if(!box) return;
    if(q.trim().length<2){ box.classList.remove('open'); box.innerHTML=''; return; }
    box.innerHTML=storeSearchResultsHtml(q.trim());
    box.classList.add('open');
    $$('[data-ss-prod]',box).forEach(it=>it.onclick=()=>{ closeResults(); State.selectedProduct=it.dataset.ssProd; State.storeView='product'; window.scrollTo(0,0); render(); });
    $$('[data-ss-cat]',box).forEach(it=>it.onclick=()=>{ closeResults(); State.catalogFilters.q=''; State.catalogFilters.cat=it.dataset.ssCat; State.storeView='catalog'; window.scrollTo(0,0); render(); });
    const all=$('[data-ss-all]',box); if(all) all.onclick=()=>goToSearch(input.value);
  };
  if(input){
    input.oninput=()=>{ if(clearBtn) clearBtn.style.display=input.value?'grid':'none'; showResults(input.value); };
    input.onfocus=()=>{ if(input.value.trim().length>=2) showResults(input.value); };
    input.onkeydown=(e)=>{ if(e.key==='Enter'){ goToSearch(input.value); } if(e.key==='Escape'){ closeResults(); input.blur(); } };
  }
  if(clearBtn) clearBtn.onclick=()=>{ input.value=''; clearBtn.style.display='none'; closeResults(); if(State.storeView==='catalog'&&State.catalogFilters.q){ goToSearch(''); } else input.focus(); };
  document.addEventListener('click',(e)=>{ if(wrap && !e.target.closest('#store-search') && !e.target.closest('.ss-overlay')) closeResults(); });
  // botón de búsqueda en móvil → overlay
  const sob=$('[data-act="store-search-open"]'); if(sob) sob.onclick=openStoreSearchOverlay;
  // limpiar búsqueda desde el catálogo
  $$('[data-act="clear-q"]').forEach(b=>b.onclick=()=>goToSearch(''));
}

    <div class="ss-overlay-bar">

function wireAdmin(){
  $$('[data-act="nav"]').forEach(a=>a.onclick=()=>{
    State.view=a.dataset.view; State.selectedOrder=null; State.selectedCustomer=null;
    closeMobileNav();
    window.scrollTo(0,0); render();
  });
  const ts=$('[data-act="toggle-sidebar"]');
  if(ts) ts.onclick=()=>{ if(window.matchMedia('(max-width:760px)').matches){ closeMobileNav(); return; } State.sidebarCollapsed=!State.sidebarCollapsed; render(); };
  const gp=$('[data-act="goto-prod"]'); if(gp) gp.onclick=()=>{ State.view='produccion'; window.scrollTo(0,0); render(); };
  const gs=$('[data-act="global-search"]');
  if(gs){
    const box=$('#gs-results');
    const close=()=>{ if(box) box.classList.remove('open'); };
    const norm=(s)=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const doSearch=(q)=>{
      q=norm(q.trim());
      if(!box) return;
      if(q.length<2){ box.classList.remove('open'); box.innerHTML=''; return; }
      const prods=PRODUCTS.filter(p=>norm(p.name).includes(q)||norm(getCat(p.cat).name).includes(q)).slice(0,4);
      const ords=ORDERS.filter(o=>norm(o.id).includes(q)||norm(getCustomer(o.customer).name).includes(q)).slice(0,4);
      const custs=CUSTOMERS.filter(c=>norm(c.name).includes(q)||norm(c.email).includes(q)).slice(0,4);
      let html='';
      if(prods.length){ html+=`<div class="gs-group">Productos</div>`+prods.map(p=>`<div class="gs-item" data-gs="prod:${p.id}"><span class="gs-ic">${icon('box')}</span><div class="grow"><div class="gs-t">${p.name}</div><div class="gs-d">${getCat(p.cat).name} · ${fmt(priceOf(p))}</div></div></div>`).join(''); }
      if(ords.length){ html+=`<div class="gs-group">Pedidos</div>`+ords.map(o=>`<div class="gs-item" data-gs="order:${o.id}"><span class="gs-ic">${icon('cart')}</span><div class="grow"><div class="gs-t">${o.id} · ${getCustomer(o.customer).name}</div><div class="gs-d">${STATUSES[o.status].label} · ${fmt(o.total)}</div></div></div>`).join(''); }
      if(custs.length){ html+=`<div class="gs-group">Clientes</div>`+custs.map(c=>`<div class="gs-item" data-gs="cust:${c.id}"><span class="gs-ic">${icon('users')}</span><div class="grow"><div class="gs-t">${c.name}</div><div class="gs-d">${c.email}</div></div></div>`).join(''); }
      if(!html) html=`<div class="gs-empty">Sin resultados para "${q}"</div>`;
      box.innerHTML=html; box.classList.add('open');
      $$('.gs-item', box).forEach(it=>it.onclick=()=>{
        const [type,id]=it.dataset.gs.split(':'); close(); gs.value='';
        if(type==='prod'){ State.view='productos'; render(); setTimeout(()=>openProductModal(getProduct(id)),120); }
        else if(type==='order'){ State.view='pedidos'; render(); setTimeout(()=>openOrderDetail(id),120); }
        else if(type==='cust'){ State.view='clientes'; render(); setTimeout(()=>openCustomerDetail(id),120); }
      });
    };
    gs.oninput=()=>doSearch(gs.value);
    gs.onfocus=()=>{ if(gs.value.trim().length>=2) doSearch(gs.value); };
    gs.onkeydown=(e)=>{ if(e.key==='Escape'){ close(); gs.blur(); } if(e.key==='Enter'){ const f=$('.gs-item',box); if(f) f.click(); } };
    document.addEventListener('click',(e)=>{ if(!e.target.closest('.global-search')) close(); });
  }
  // run per-view wiring
  if(window.__viewWire) window.__viewWire();
}

function animateCount(node, to, opts={}){
  const dur = opts.dur || 1100, dec = opts.dec||0, pre=opts.pre||'', suf=opts.suf||'';
  const start = performance.now();
  function step(now){
    const t = Math.min((now-start)/dur, 1);
    const e = 1 - Math.pow(1-t, 3);
    const val = to*e;
    node.textContent = pre + (opts.compact ? compactN(val) : val.toLocaleString('es-AR',{minimumFractionDigits:dec,maximumFractionDigits:dec})) + suf;
    if(t<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function compactN(n){ return n>=1000000 ? (n/1000000).toFixed(2)+'M' : n>=1000 ? (n/1000).toFixed(0)+'k' : Math.round(n); }

  return `<div class="card card-hover kpi">

      <span class="kpi-delta ${d.up?'up':'down'}">${icon(d.up?'arrowUp':'arrowDown')}${d.delta}</span>
    </div>
    <div class="kpi-val" data-count="${d.value}" data-pre="${d.pre||''}" data-suf="${d.suf||''}" data-dec="${d.dec||0}" data-compact="${d.compact?1:0}">0</div>

}

  // revenue chart
  const ctx = $('#chart-rev'); if(!ctx) return;
  Chart.getChart(ctx)?.destroy();
  const css = getComputedStyle(document.documentElement);
  const gold = css.getPropertyValue('--gold').trim();
  const grid = css.getPropertyValue('--border').trim();
  const dim = css.getPropertyValue('--text-faint').trim();
  const g = ctx.getContext('2d'); const grad = g.createLinearGradient(0,0,0,260);
  grad.addColorStop(0,goldRgba('.35')); grad.addColorStop(1,goldRgba('0'));
  new Chart(ctx,{ type:'line',
    data:{ labels:REV_30.map((_,i)=>i+1), datasets:[{ data:REV_30, borderColor:gold, borderWidth:2.5, fill:true, backgroundColor:grad, tension:.4, pointRadius:0, pointHoverRadius:5, pointHoverBackgroundColor:gold }]},
    options:{ responsive:true, maintainAspectRatio:false, animation:false, plugins:{legend:{display:false}, tooltip:{callbacks:{title:(it)=>'Día '+it[0].label, label:(it)=>fmt(it.raw)}, backgroundColor:css.getPropertyValue('--surface-3').trim(), borderColor:gold, borderWidth:1, titleColor:css.getPropertyValue('--text').trim(), bodyColor:gold, padding:10, displayColors:false}},
      scales:{ x:{grid:{display:false},ticks:{color:dim,maxTicksLimit:8,font:{size:10}}}, y:{grid:{color:grid},ticks:{color:dim,callback:v=>fmtK(v),font:{size:10}}}}}
  });
};

<script>

let prodView = 'grid', prodCatFilter = 'all', prodSearch = '';

      <div>
        <div class="eyebrow">Catálogo</div>

        <button class="btn btn-secondary" data-act="dyn-pricing">${icon('zap')} Precios dinámicos${autoPriceCount()?` · ${autoPriceCount()}`:''}</button>

function prodGridCard(p){

function prodTable(list){
  return `<div class="card"><div class="table-wrap" style="border:none">

VIEW_WIRE.productos = function(){

function openDynPricing(){

  openModal(`
    <div class="modal-head"><div><div class="eyebrow" style="color:var(--gold-bright)">${icon('zap')} Precios dinámicos</div><div class="section-title">Actualizá precios por costo e inflación</div></div><button class="icon-btn" data-act="close">${icon('x')}</button></div>

      <div>
        <div class="section-title" style="font-size:14px;margin-bottom:4px">${icon('chart')} Ajuste por inflación</div>

        <div class="row gap-2 wrap" style="align-items:center">
          ${[5,10,15,20].map(v=>`<button class="chip" data-infl="${v}">+${v}%</button>`).join('')}
          <div class="row gap-2" style="align-items:center"><input class="input" id="infl-custom" type="number" placeholder="Otro %" style="width:90px"/><button class="btn btn-secondary btn-sm" data-act="infl-apply">${icon('arrowUp')} Aplicar a costos</button></div>
        </div>
        <div class="faint" style="font-size:11.5px;margin-top:8px" id="infl-hint">Ej: PLA hoy ${fil?calcMoney(fil.cost)+'/kg':'—'} · kWh ${calcMoney(CALC_CFG.precioKwh||95)}</div>

      <div>
        <div class="row between" style="margin-bottom:10px"><div class="section-title" style="font-size:14px">Impacto por categoría</div><span class="faint" style="font-size:12px">${PRODUCTS.length} productos</span></div>

          <table class="tbl"><thead><tr><th>Categoría</th><th style="text-align:center">Productos</th><th style="text-align:center">Margen</th><th style="text-align:right">Costo prom.</th><th style="text-align:right">Precio actual</th><th style="text-align:right">Sugerido</th></tr></thead>
          <tbody>${cats.map(x=>{ const up=x.avgSug>x.avgNow; return `<tr>

  $('[data-act="dp-apply-all"]').onclick=()=>{
    const n=recalcStorePrices(); savePricing();

    toast(n?`${n} producto${n>1?'s':''} repreciado${n>1?'s':''} en toda la tienda`:'Los precios ya estaban al día', n?'success':'danger');
  };
}

// motor de cálculo según las fórmulas del Excel
function filamentPriceKg(material, color){
  // toma el costo/kg del inventario según material+color; si no hay match, usa el precio global
  let f = FILAMENTS.find(x=>x.material===material && x.color===color)
       || FILAMENTS.find(x=>x.material===material)
       || FILAMENTS.find(x=>x.color===color);
  return f ? f.cost : 0;
}
function presetTierMargin(preset, qty){
  if(!preset || !Array.isArray(preset.tiers) || !preset.tiers.length) return 150;
  const q=Math.max(1, +qty||1);
  const sorted=[...preset.tiers].sort((a,b)=>a.minQty-b.minQty);
  let m=sorted[0].margin;
  sorted.forEach(t=>{ if(q>=t.minQty) m=t.margin; });
  return m;
}
function qtyTierLabel(t, tiers){
  const i=tiers.indexOf(t);
  const next=tiers[i+1];
  if(t.minQty<=1) return next ? `Por unidad (1 a ${next.minQty-1})` : 'Por unidad';
  return next ? `Desde ${t.minQty} unidades (${t.minQty} a ${next.minQty-1})` : `Desde ${t.minQty} unidades`;
}
function computeCalc(input){
  const cfg=CALC_CFG;
  const horas = (+input.horas||0) + (+input.minutos||0)/60;
  const precioKg = filamentPriceKg(input.material, input.color);
  const material = (+input.gramos||0) * precioKg / 1000;
  const electricidad = ((cfg.consumoWatts * cfg.precioKwh) / 1000) * horas;
  const desgaste = (cfg.costoMantenimiento / cfg.vidaUtilHoras) * horas;
  const margenError = (material + electricidad + desgaste) * (cfg.margenError/100);
  const costoTotal = material + electricidad + desgaste + margenError;
  // margen (%) tiene prioridad; si no, usa el multiplicador heredado
  const mult = (input.margin!=null && input.margin!=='') ? (1 + (+input.margin||0)/100) : (+input.multiplicador||1);
  const precioFinal = costoTotal * mult;
  const ganancia = precioFinal - costoTotal;
  return { horas, material, electricidad, desgaste, margenError, costoTotal, ganancia, precioFinal, mult, precioKg };
}

      printHours:+$('#f-hours').value||0, weight:+$('#f-weight').value||0, prodTime:$('#f-prodtime').value.trim(),
      dimH:+$('#f-dimH').value||0, dimW:+$('#f-dimW').value||0, dimD:+$('#f-dimD').value||0,
      rating:p.rating||5.0, sold:p.sold||0 };
    if(edit){ Object.assign(p,data); } else { PRODUCTS.unshift({id:'p'+uid(),...data}); }
    closeModal();
    if(State.view==='productos'){ rerenderProducts(); }
    else { State.view='productos'; render(); } // creado desde el Dashboard → llevar a Productos
    toast(edit?'Producto actualizado':'Producto creado y publicado','success');
  };
}
</script>

<script>

    connected:true, conn:{ mode:'lan', ip:'192.168.0.42', serial:'00M09A2400123456', code:'' }, signal:96,
    status:'imprimiendo', nozzle:220, bed:60, hours:340, success:96,
    job:{ prod:'Dragón Articulado Fidget', order:'HEF-1041', cust:'c3', progress:67, etaMin:42, layer:312, layers:480, color:'Negro', grams:85 } },
  { id:'pr2', name:'Bambu Lab A1 mini', model:'Bed slinger · 180³ · AMS lite', type:'FDM', brand:'bambu',
    connected:true, conn:{ mode:'lan', ip:'192.168.0.43', serial:'00M09M2400765432', code:'' }, signal:88,
    status:'libre', nozzle:0, bed:0, hours:180, success:94, job:null },
  ];
})();
function savePrinters(){ try{ localStorage.setItem('hef-printers', JSON.stringify(PRINTERS)); }catch(e){} }
let PRINT_QUEUE = [
  { id:'q1', prod:'Maceta Geométrica Hexa ×2', order:'HEF-1041', cust:'c3', mat:'PLA mate', color:'Verde', etaH:3.5, priority:'alta', grams:160, layers:230 },
  { id:'q2', prod:'Reloj de Pared Engranaje', order:'HEF-1040', cust:'c2', mat:'PLA + ABS', color:'Negro', etaH:6, priority:'normal', grams:240, layers:610 },
  { id:'q3', prod:'Soporte Joystick Battlestation', order:'HEF-1042', cust:'c1', mat:'PETG', color:'Dorado', etaH:4, priority:'normal', grams:140, layers:520 },
  { id:'q4', prod:'Organizador Nexus', order:'HEF-1043', cust:'c1', mat:'PLA', color:'Blanco', etaH:2, priority:'baja', grams:120, layers:300 },
];
const PRIO = { alta:{label:'Alta',badge:'danger'}, normal:{label:'Normal',badge:'info'}, baja:{label:'Baja',badge:'neutral'} };
function fmtEta(min){ min=Math.max(0,Math.round(min)); const h=Math.floor(min/60), m=min%60; return h?`${h}h ${m}m`:`${m}m`; }

function ViewProduccion(){

  const queueH = PRINT_QUEUE.reduce((a,j)=>a+j.etaH,0);
  const todayH = 38.5;
  const avgSuccess = Math.round(PRINTERS.reduce((a,p)=>a+p.success,0)/PRINTERS.length);
  return `<div class="view">
    <div class="page-head">
      <div>
        <div class="eyebrow">Producción</div>
        <h1 class="page-title">Cola de impresión</h1>
        <div class="page-sub">${printing.length} de ${PRINTERS.length} impresoras activas · monitoreo en vivo de la granja</div>
      </div>
      <div class="row gap-2">
        <button class="btn btn-secondary" data-act="pr-refresh">${icon('refresh')} Actualizar</button>
        <button class="btn btn-primary" data-act="pr-addprinter">${icon('plus')} Conectar impresora</button>
      </div>
    </div>

    <div class="card" style="padding:15px 18px;margin-bottom:18px;background:linear-gradient(150deg,rgba(90,156,217,.08),transparent);border-color:rgba(90,156,217,.22)">
      <div class="row between wrap gap-3">
        <div class="row gap-3" style="align-items:center">
          <div class="kpi-ic" style="width:40px;height:40px;background:rgba(90,156,217,.14);color:#5A9CD9">${icon('wifi')}</div>
          <div>
            <div style="font-weight:600;font-size:13.5px">Conexión Bambu Lab · ${PRINTERS.filter(p=>p.connected).length}/${PRINTERS.length} en línea</div>
            <div class="faint" style="font-size:12px">Vinculá tus impresoras por <b>modo LAN</b> (IP + código de acceso) o <b>Bambu Cloud</b> para ver el estado en tiempo real.</div>
          </div>
        </div>
        <div class="row gap-2 wrap">
          ${PRINTERS.map(p=>`<span class="badge ${p.connected?'badge-success':'badge-danger'}" style="cursor:pointer" data-pr-conn="${p.id}"><span class="dot"></span>${p.name.replace('Bambu Lab ','')} · ${p.connected?(p.conn.mode==='lan'?'LAN':'Cloud'):'sin conexión'}</span>`).join('')}
        </div>
      </div>
    </div>

    <div class="kpi-grid stagger" style="margin-bottom:18px">
      ${kpiCard({icon:'printer',label:'Impresoras activas',value:printing.length,suf:'/'+PRINTERS.length,delta:'en marcha',up:true,tint:'#5A9CD9'})}
      ${kpiCard({icon:'layers',label:'Trabajos en cola',value:PRINT_QUEUE.length,delta:'≈ '+queueH.toFixed(1)+' h',up:true,tint:'#C9A84C'})}
      ${kpiCard({icon:'clock',label:'Horas impresas hoy',value:todayH,suf:' h',dec:1,delta:'+6,2 h',up:true,tint:'#4CB782'})}
      ${kpiCard({icon:'check2',label:'Tasa de éxito',value:avgSuccess,suf:'%',delta:'últimos 30 días',up:true,tint:'#9B7BD4'})}
    </div>

    <div class="dash-grid">
      <div>
        <div class="row between" style="margin-bottom:14px">
          <div class="section-title">Granja de impresoras</div>
          <span class="row gap-2 faint" style="font-size:12px"><span class="pp-live"></span> En vivo</span>
        </div>
        <div class="grid-2 stagger" id="printer-farm">${PRINTERS.map(printerCard).join('')}</div>
      </div>

      <div>
        <div class="row between" style="margin-bottom:14px">
          <div class="section-title">Cola de trabajos</div>
          <button class="btn btn-secondary btn-sm" data-act="pr-newjob">${icon('plus')} Encolar</button>
        </div>
        <div class="card section-card" style="padding:16px">
          ${PRINT_QUEUE.length===0?`<div class="empty" style="padding:30px">${icon('check2')}<div style="margin-top:8px">Cola vacía · todo asignado</div></div>`:
          `<div class="col gap-2" id="queue-list">${PRINT_QUEUE.map((j,i)=>queueItem(j,i)).join('')}</div>`}
        </div>
        <div class="card section-card" style="padding:16px;margin-top:16px">
          <div class="row gap-2" style="color:var(--gold-bright);margin-bottom:12px">${icon('layers')}<b style="font-size:13.5px">Filamento en uso ahora</b></div>
          <div class="col gap-2">
            ${(()=>{ const m={}; PRINTERS.filter(p=>p.status==='imprimiendo'&&p.job).forEach(p=>{ m[p.job.color]=(m[p.job.color]||0)+p.job.grams; });
              const ents=Object.entries(m); if(!ents.length) return '<div class="faint" style="font-size:12.5px">Sin impresiones activas.</div>';
              return ents.map(([c,g])=>`<div class="row between" style="font-size:12.5px"><span class="row gap-2"><span style="width:13px;height:13px;border-radius:50%;background:${filColor(c)};border:1px solid var(--border)"></span>${c}</span><b>${g} g</b></div>`).join(''); })()}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function printerCard(p){
  const st=PR_STATUS[p.status];
  const connChip = p.connected
    ? `<span class="conn-chip ok" title="${p.conn.mode==='lan'?'Modo LAN · '+p.conn.ip:'Bambu Cloud'}">${icon('wifi')}${p.conn.mode==='lan'?'LAN':'Cloud'} · ${p.signal}%</span>`
    : `<span class="conn-chip off">${icon('power')}sin conexión</span>`;
  const head=`<div class="row between" style="margin-bottom:12px">
      <div class="row gap-3">
        <div class="kpi-ic" style="width:40px;height:40px;background:${st.color}1f;color:${st.color}">${icon(p.type==='Resina'?'sparkles':'printer')}</div>
        <div><div class="row gap-2" style="align-items:center"><span style="font-weight:600;font-size:14px">${p.name}</span>${connChip}</div><div class="faint" style="font-size:11.5px">${p.model} · ${p.type}</div></div>
      </div>
      <span class="badge badge-${st.badge}"><span class="dot" ${p.status==='imprimiendo'?'style="animation:ppPulse 1.2s infinite"':''}></span>${st.label}</span>
    </div>`;

  if(!p.connected){
    return `<div class="card printer-card" data-pp="${p.id}" style="padding:16px;border-style:dashed;opacity:.92">
      ${head}
      <div class="col center" style="padding:14px 0;gap:8px;text-align:center">
        <div class="kpi-ic" style="width:44px;height:44px;background:rgba(217,106,90,.1);color:var(--danger)">${icon('power')}</div>
        <div class="faint" style="font-size:12.5px">Impresora sin conexión · no se puede monitorear ni enviar trabajos hasta vincularla.</div>
      </div>
      <button class="btn btn-primary btn-sm btn-block" data-pr-connect="${p.id}">${icon('wifi')} Conectar impresora</button>
    </div>`;
  }

  if((p.status==='imprimiendo'||p.status==='pausada') && p.job){
    const j=p.job; const cust=getCustomer(j.cust);
    return `<div class="card printer-card" data-pp="${p.id}" style="padding:16px;border-color:${st.color}33">
      ${head}
      <div style="font-weight:600;font-size:13.5px;margin-bottom:2px">${j.prod}</div>
      <div class="faint" style="font-size:11.5px;margin-bottom:12px">${j.order}${cust?' · '+cust.name:''}</div>
      <div class="row between" style="font-size:12px;margin-bottom:6px">
        <span class="faint">Progreso</span>
        <b class="pp-pct" style="color:${st.color}">${Math.round(j.progress)}%</b>
      </div>
      <div class="progress" style="height:8px"><div class="pp-bar" style="width:${j.progress}%;background:${p.status==='pausada'?'var(--warning)':'linear-gradient(90deg,var(--gold-deep),var(--gold-bright))'}"></div></div>
      <div class="row between faint" style="font-size:11px;margin-top:6px">
        <span class="pp-layer">Capa ${j.layer}/${j.layers}</span>
        <span class="pp-eta">${p.status==='pausada'?'En pausa':'≈ '+fmtEta(j.etaMin)+' restante'}</span>
      </div>
      <div class="row gap-2" style="margin-top:12px;font-size:11.5px;color:var(--text-dim)">
        <span class="row gap-1" style="gap:5px"><span style="width:11px;height:11px;border-radius:50%;background:${filColor(j.color)};border:1px solid var(--border)"></span>${j.color}</span>
        ${p.type==='FDM'?`<span class="row gap-1" style="gap:4px">${icon('thermo')}${p.nozzle}°</span><span class="row gap-1" style="gap:4px">cama ${p.bed}°</span>`:`<span class="row gap-1" style="gap:4px">${icon('zap')} UV · ${(j.layers*0.05).toFixed(0)}µm</span>`}
        <span class="row gap-1" style="gap:4px">${icon('weight')}${j.grams}g</span>
      </div>
      <div class="row gap-2" style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
        ${p.status==='imprimiendo'?`<button class="btn btn-secondary btn-sm grow" data-pr-pause="${p.id}">${icon('pause')} Pausar</button>`
                                  :`<button class="btn btn-primary btn-sm grow" data-pr-resume="${p.id}">${icon('play')} Reanudar</button>`}
        <button class="btn btn-ghost btn-sm" data-pr-detail="${p.id}">${icon('eye')} Detalle</button>
      </div>
    </div>`;
  }
  if(p.status==='libre'){
    return `<div class="card printer-card" data-pp="${p.id}" style="padding:16px">
      ${head}
      <div class="col center" style="padding:14px 0;gap:8px;text-align:center">
        <div class="kpi-ic" style="width:44px;height:44px;background:rgba(76,183,130,.1);color:var(--success)">${icon('check2')}</div>
        <div class="faint" style="font-size:12.5px">Lista para imprimir · ${p.hours.toLocaleString('es-AR')} h de uso</div>
      </div>
      <button class="btn btn-primary btn-sm btn-block" data-pr-assign="${p.id}" ${PRINT_QUEUE.length?'':'disabled style="opacity:.5;cursor:not-allowed"'}>${icon('arrowRight')} Asignar siguiente de la cola</button>
    </div>`;
  }
  if(p.status==='mantenimiento'){
    return `<div class="card printer-card" data-pp="${p.id}" style="padding:16px;border-color:rgba(155,154,166,.25)">
      ${head}
      <div class="card" style="padding:11px 13px;background:var(--surface-2);font-size:12.5px;margin-bottom:12px"><span class="faint">${icon('settings')} ${p.note||'En mantenimiento'}</span></div>
      <button class="btn btn-secondary btn-sm btn-block" data-pr-ready="${p.id}">${icon('check')} Marcar lista</button>
    </div>`;
  }
  // error
  const j=p.job;
  return `<div class="card printer-card" data-pp="${p.id}" style="padding:16px;border-color:rgba(217,106,90,.35);box-shadow:0 0 24px rgba(217,106,90,.08)">
    ${head}
    <div class="card" style="padding:11px 13px;background:rgba(217,106,90,.08);border-color:rgba(217,106,90,.25);font-size:12.5px;margin-bottom:12px;color:var(--danger)">${icon('alert')} ${p.note||'Error de impresión'}</div>
    ${j?`<div class="faint" style="font-size:11.5px;margin-bottom:12px">${j.prod} · se detuvo al ${Math.round(j.progress)}% (${j.grams}g de ${j.color})</div>`:''}
    <div class="row gap-2">
      <button class="btn btn-secondary btn-sm grow" data-pr-retry="${p.id}">${icon('refresh')} Reintentar</button>
      <button class="btn btn-danger btn-sm grow" data-pr-fail="${p.id}">${icon('alert')} Registrar falla</button>
    </div>
  </div>`;
}

function queueItem(j,i){
  const pr=PRIO[j.priority]; const cust=getCustomer(j.cust);
  return `<div class="card" style="padding:12px 13px" data-qid="${j.id}">
    <div class="row between" style="margin-bottom:7px">
      <div class="row gap-2"><span class="faint" style="font-family:var(--font-display);font-size:12px">#${i+1}</span><b style="font-size:13px">${j.prod}</b></div>
      <span class="badge badge-${pr.badge}" style="padding:2px 8px">${pr.label}</span>
    </div>
    <div class="row between faint" style="font-size:11.5px;margin-bottom:10px">
      <span class="row gap-2"><span style="width:11px;height:11px;border-radius:50%;background:${filColor(j.color)};border:1px solid var(--border)"></span>${j.mat} · ${j.color}</span>
      <span>${icon('clock')} ≈ ${j.etaH}h · ${j.order}</span>
    </div>
    <div class="row gap-2">
      <button class="btn btn-secondary btn-sm grow" data-q-assign="${j.id}">${icon('printer')} Asignar a impresora</button>
      ${i>0?`<button class="btn-icon btn-ghost btn-sm" data-q-up="${j.id}" title="Subir prioridad">${icon('arrowUp')}</button>`:''}
      <button class="btn-icon btn-ghost btn-sm" data-q-del="${j.id}" title="Quitar de la cola">${icon('x')}</button>
    </div>
  </div>`;
}

function rerenderProduccion(){ savePrinters(); $('#content').innerHTML = ViewProduccion(); VIEW_WIRE.produccion(); }

function prAssignJob(printerId, queueId){
  const p=PRINTERS.find(x=>x.id===printerId); if(!p) return;
  const qi = queueId ? PRINT_QUEUE.findIndex(j=>j.id===queueId) : 0;
  if(qi<0 || !PRINT_QUEUE.length){ toast('La cola está vacía','danger'); return; }
  const j=PRINT_QUEUE.splice(qi,1)[0];
  p.status='imprimiendo';
  p.job={ prod:j.prod, order:j.order, cust:j.cust, progress:0, etaMin:Math.round(j.etaH*60), layer:0, layers:j.layers||300, color:j.color, grams:j.grams };
  if(p.type==='FDM'){ p.nozzle = j.mat.includes('PETG')?240:j.mat.includes('ABS')?250:210; p.bed = j.mat.includes('PETG')||j.mat.includes('ABS')?80:55; }
  rerenderProduccion(); toast(`${j.prod} asignado a ${p.name}`);
}

VIEW_WIRE.produccion = function(){
  $$('[data-count]').forEach(n=>animateCount(n,+n.dataset.count,{pre:n.dataset.pre,suf:n.dataset.suf,dec:+n.dataset.dec,compact:n.dataset.compact==='1'}));
  $$('[data-pr-pause]').forEach(b=>b.onclick=()=>{ const p=PRINTERS.find(x=>x.id===b.dataset.prPause); if(p){p.status='pausada';rerenderProduccion();toast(p.name+' en pausa','danger');} });
  $$('[data-pr-resume]').forEach(b=>b.onclick=()=>{ const p=PRINTERS.find(x=>x.id===b.dataset.prResume); if(p){p.status='imprimiendo';rerenderProduccion();toast(p.name+' reanudada');} });
  $$('[data-pr-assign]').forEach(b=>b.onclick=()=>prAssignJob(b.dataset.prAssign,null));
  $$('[data-q-assign]').forEach(b=>b.onclick=()=>{ const free=PRINTERS.find(p=>p.status==='libre'); if(!free){ toast('No hay impresoras disponibles ahora','danger'); return; } prAssignJob(free.id,b.dataset.qAssign); });
  $$('[data-pr-ready]').forEach(b=>b.onclick=()=>{ const p=PRINTERS.find(x=>x.id===b.dataset.prReady); if(p){p.status='libre';p.note='';rerenderProduccion();toast(p.name+' lista para imprimir');} });
  $$('[data-pr-retry]').forEach(b=>b.onclick=()=>{ const p=PRINTERS.find(x=>x.id===b.dataset.prRetry); if(p&&p.job){p.status='imprimiendo';p.job.progress=0;p.job.layer=0;p.note='';rerenderProduccion();toast('Reintentando '+p.job.prod);} });
  $$('[data-pr-fail]').forEach(b=>b.onclick=()=>{ const p=PRINTERS.find(x=>x.id===b.dataset.prFail); if(p&&p.job){
      FAILS.unshift({ id:'fa'+uid(), piece:p.job.prod, material:p.type==='Resina'?'Resina':'PLA', color:p.job.color, grams:p.job.grams, reason:'Filamento enredado', notes:'Registrada desde '+p.name+' ('+(p.note||'error de impresión')+')', at:new Date().toISOString().slice(0,16).replace('T',' ') });
      saveFails(); p.status='libre'; p.job=null; p.note=''; rerenderProduccion(); toast('Falla registrada en Impresiones fallidas','danger');
  } });
  $$('[data-pr-detail]').forEach(b=>b.onclick=()=>openPrinterDetail(b.dataset.prDetail));
  $$('[data-q-up]').forEach(b=>b.onclick=()=>{ const i=PRINT_QUEUE.findIndex(j=>j.id===b.dataset.qUp); if(i>0){ [PRINT_QUEUE[i-1],PRINT_QUEUE[i]]=[PRINT_QUEUE[i],PRINT_QUEUE[i-1]]; rerenderProduccion(); } });
  $$('[data-q-del]').forEach(b=>b.onclick=()=>{ PRINT_QUEUE=PRINT_QUEUE.filter(j=>j.id!==b.dataset.qDel); rerenderProduccion(); toast('Trabajo quitado de la cola','danger'); });
  const rf=$('[data-act="pr-refresh"]'); if(rf) rf.onclick=()=>{ rerenderProduccion(); toast('Estado actualizado'); };
  const nj=$('[data-act="pr-newjob"]'); if(nj) nj.onclick=()=>openNewJobModal();
  const ap=$('[data-act="pr-addprinter"]'); if(ap) ap.onclick=()=>openConnectModal(null);
  $$('[data-pr-connect]').forEach(b=>b.onclick=()=>openConnectModal(b.dataset.prConnect));
  $$('[data-pr-conn]').forEach(b=>b.onclick=()=>openConnectModal(b.dataset.prConn));
  startProdTick();
};

function openConnectModal(printerId){
  const editing = printerId ? PRINTERS.find(p=>p.id===printerId) : null;
  const mode = editing ? editing.conn.mode : 'lan';
  openModal(`
    <div class="modal-head">
      <div><div class="eyebrow" style="color:#5A9CD9">Conexión Bambu Lab</div><div class="section-title">${editing?editing.name:'Conectar nueva impresora'}</div></div>

        </div>
      </div>

      <div id="cn-lan" style="${mode==='cloud'?'display:none':''}">
        <div class="card" style="padding:14px;background:var(--surface-2)">

          <div class="field" style="margin-bottom:11px"><label>Dirección IP</label><input class="input" id="cn-ip" value="${editing?editing.conn.ip:''}" placeholder="192.168.0.42"/></div>
          <div class="grid-2">

function startProdTick(){
  if(window.__prodTick) clearInterval(window.__prodTick);
  window.__prodTick = setInterval(()=>{
    if(State.view!=='produccion' || State.mode!=='admin'){ clearInterval(window.__prodTick); window.__prodTick=null; return; }
    let completed=false;
    PRINTERS.forEach(p=>{
      if(p.status!=='imprimiendo'||!p.job) return;
      const j=p.job;
      j.progress = Math.min(100, j.progress + (0.4 + Math.random()*1.4));
      j.layer = Math.min(j.layers, Math.round(j.progress/100*j.layers));
      j.etaMin = Math.max(0, Math.round((100-j.progress)/100 * (j.layers/ j.layers) * (j.etaMin>0?j.etaMin:1) ));
      // recompute eta proportionally from remaining
      j.etaMin = Math.max(0, Math.round((100-j.progress) * 1.1));
      if(j.progress>=100){ completed=true; p._done=j.prod; p.status='libre'; p.job=null; p.hours+=1; }
      else {
        const card=document.querySelector(`[data-pp="${p.id}"]`);
        if(card){ const bar=card.querySelector('.pp-bar'), pct=card.querySelector('.pp-pct'), lay=card.querySelector('.pp-layer'), eta=card.querySelector('.pp-eta');
          if(bar) bar.style.width=j.progress+'%'; if(pct) pct.textContent=Math.round(j.progress)+'%';
          if(lay) lay.textContent=`Capa ${j.layer}/${j.layers}`; if(eta) eta.textContent='≈ '+fmtEta(j.etaMin)+' restante'; }
      }
    });
    if(completed){
      const done=PRINTERS.filter(p=>p._done); done.forEach(p=>{ toast('✓ '+p.name+' terminó: '+p._done,'success'); delete p._done; });
      rerenderProduccion();
    }
  }, 1600);
}

/* botón rápido para avanzar/completar el pedido sin abrir el detalle */
function orderQuickAction(o){

  if(o.status==='entregado') return `<div class="row gap-2 center" style="margin-top:12px;color:var(--success);font-weight:600;font-size:12.5px">${icon('check2')} Completado</div>`;

}

/* avanza un pedido al siguiente estado (reutilizable desde grilla, tabla y detalle) */
/* avanza un pedido al siguiente estado (reutilizable desde grilla, tabla y detalle) */
function consumeFilament(o){
  // descuenta los gramos de cada ítem del stock de filamentos y avisa si falta
  const shortages=[];
  o.items.forEach(it=>{
    const p=getProduct(it.p); if(!p) return;
    const grams=(p.weight||0)*it.q; if(grams<=0) return;
    // colores que lleva: multicolor = todos sus colores; single = el color elegido (o el primero)
    const cols = (p.colorMode==='multi') ? (p.colors||[]) : [ it.color || (p.colors&&p.colors[0]) || 'Negro' ];
    const per = grams / (cols.length||1);
    cols.forEach(cn=>{
      // buscar filamento por material + color, luego solo color
      let f=FILAMENTS.find(x=>x.material===p.material && x.color===cn) || FILAMENTS.find(x=>x.color===cn);
      if(!f){ shortages.push({color:cn, material:p.material, need:Math.round(per), have:0}); return; }
      const before=f.stock; f.stock=Math.max(0, f.stock-per);
      if(before < per){ shortages.push({color:cn, material:f.material, need:Math.round(per), have:Math.round(before)}); }
      else if(f.stock<=f.alert){ shortages.push({color:cn, material:f.material, low:true, have:Math.round(f.stock)}); }
    });
  });
  saveFilaments();
  return shortages;
}
function notifyShortages(shortages, orderId){
  shortages.forEach(s=>{
    if(s.low){
      pushNotif({ic:'alert',c:'warning',t:'Stock bajo: '+s.material+' '+s.color, d:'Quedan '+s.have+'g · conviene reponer'});
      toast('⚠ Stock bajo de '+s.material+' '+s.color+' ('+s.have+'g)','danger');
    } else {
      pushNotif({ic:'alert',c:'danger',t:'Falta filamento: '+s.material+' '+s.color, d:'El pedido '+orderId+' necesita '+s.need+'g y no hay suficiente. Comprá más '+s.color+'.'});
      toast('⛔ Necesitás comprar más '+s.material+' '+s.color,'danger');
    }
  });
}

function advanceOrderStatus(id){
  const o=ORDERS.find(x=>x.id===id); if(!o) return;
  const curIdx=STATUS_FLOW.indexOf(o.status);

  o.status=next; o.history.push([next, nowStamp()]);
  // al confirmar (pasar a producción) descuenta el filamento del stock
  if(next==='produccion' && !o.filamentConsumed){ o.filamentConsumed=true; const sh=consumeFilament(o); notifyShortages(sh, id); }
  if(next==='listo') getChat(id).push({from:'shop', name:'Hefesto 3D', text:'¡Tu pedido ya está listo para retirar! 🎉 Te esperamos en Av. Corrientes 3247, CABA (Lun a Sáb 10–19h).', at:nowStamp()});
  if(next==='enviado') getChat(id).push({from:'shop', name:'Hefesto 3D', text:'¡Tu pedido fue despachado! 🚚'+(o.track?' Seguimiento: '+o.track:''), at:nowStamp()});

  toast('Pedido '+id+' → "'+STATUSES[next].label+'"');
}

let HEF_SEQ = 1043;
function nextOrderId(){ // siguiente id libre tipo HEF-XXXX

function findOrCreateCustomer(name, extra){
  name=(name||'').trim(); if(!name) name='Cliente sin nombre';
  let c=CUSTOMERS.find(x=>x.name.toLowerCase()===name.toLowerCase() || (extra&&extra.email&&x.email&&x.email.toLowerCase()===extra.email.toLowerCase()));
  if(c) return c;

  CUSTOMERS.push(c); return c;
}
function addHistoricSale(s){ // s: {date, customer, email, detalle, total, pay, status}

  const total=+s.total||0;
  const status=s.status||'entregado';
  const o={ id:nextOrderId(), customer:c.id, date:s.date||nowStamp(), status,
    items:[{ p:'hist', name:s.detalle||'Venta histórica', q:1, price:total }],
    total, pay:s.pay||'Efectivo', track:'', note:'Importado del historial de ventas', imported:true,
    history:[[status, s.date||nowStamp()]] };
  ORDERS.unshift(o);
  c.orders=(c.orders||0)+1; if(status!=='cancelado') c.spent=(c.spent||0)+total;
  return o;
}

function parseSalesText(txt){
  const rows=[]; const errors=[];
  const lines=txt.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length);
  if(!lines.length) return {rows, errors:['No hay filas para importar']};
  // detecta separador (coma, ; o tab)
  const sep = lines[0].includes('\t') ? '\t' : (lines[0].split(';').length>lines[0].split(',').length ? ';' : ',');
  const split=(l)=>l.split(sep).map(c=>c.trim().replace(/^"|"$/g,''));
  let start=0;
  const head=split(lines[0]).map(h=>h.toLowerCase());
  const looksHeader = head.some(h=>/fecha|cliente|total|detalle|producto|pago/.test(h));
  if(looksHeader) start=1;
  for(let i=start;i<lines.length;i++){
    const c=split(lines[i]); if(c.length<3){ errors.push('Fila '+(i+1)+': faltan columnas'); continue; }
    const total=parseFloat((c[3]||'').replace(/[^\d.,-]/g,'').replace(/\.(?=\d{3})/g,'').replace(',','.'));
    if(isNaN(total)){ errors.push('Fila '+(i+1)+': total inválido'); continue; }
    rows.push({ date:(c[0]||'').trim()||nowStamp().slice(0,10), customer:(c[1]||'').trim(), detalle:(c[2]||'').trim(), total, pay:(c[4]||'Efectivo').trim(), status:(c[5]||'entregado').trim().toLowerCase() });
  }
  return {rows, errors};
}

  cb.innerHTML=`<div class="chat-day">Conversación con ${c.name.split(' ')[0]} · ${id}</div>`+renderChatAdmin(id);

}

const REWARD_TYPES = {
  shipping: { label:'Envío gratis', ic:'truck', color:'#5A9CD9' },

function rewardRedemptions(rid){
  // cuenta cuántas veces se canjeó esta recompensa (por título, en los vouchers de clientes)
  const r=REWARDS.find(x=>x.id===rid); if(!r) return 0;
  let n=0; Object.values(ACCOUNT_DATA).forEach(ad=>{ (ad.vouchers||[]).forEach(v=>{ if(v.title===r.title) n++; }); });
  return n;
}

  };

    <div class="modal-body col gap-4">
      <div class="field"><label>Tipo de recompensa</label>

          ${Object.entries(REWARD_TYPES).map(([k,t])=>`<button class="chip ${r.type===k?'active':''}" data-rtype="${k}">${t.label}</button>`).join('')}
        </div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Título</label><input class="input" id="rw-title" value="${r.title}" placeholder="Ej: $2.000 de descuento"/></div>
        <div class="field"><label>Costo en puntos</label><input class="input" id="rw-cost" type="number" value="${r.cost}" placeholder="500"/></div>
      </div>
      <div class="field"><label>Descripción</label><input class="input" id="rw-desc" value="${r.desc}" placeholder="Cupón aplicable a cualquier pedido"/></div>
      <div id="rw-typefields">${renderTypeFields(r.type)}</div>
      <div class="auth-err hide" id="rw-err">${icon('alert')}<span></span></div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" data-act="close">Cancelar</button><button class="btn btn-primary" data-act="save">${icon('check')} ${edit?'Guardar':'Crear recompensa'}</button></div>
  `);
  let curType=r.type;
  $$('[data-act="close"]').forEach(b=>b.onclick=closeModal);
  $$('#rw-types [data-rtype]').forEach(b=>b.onclick=()=>{ curType=b.dataset.rtype; $$('#rw-types .chip').forEach(x=>x.classList.toggle('active',x===b)); $('#rw-typefields').innerHTML=renderTypeFields(curType); });
  $('[data-act="save"]').onclick=()=>{
    const title=$('#rw-title').value.trim(), cost=+$('#rw-cost').value||0, desc=$('#rw-desc').value.trim();
    const err=$('#rw-err'); const fail=(m)=>{ err.classList.remove('hide'); err.querySelector('span').textContent=m; };
    if(!title){ return fail('Ingresá un título'); }
    if(cost<=0){ return fail('Ingresá un costo en puntos válido'); }
    const data={ type:curType, cost, title, desc, ic:REWARD_TYPES[curType].ic };

    else { data.ic='truck'; }

    closeModal(); rerenderRecompensas(); toast(edit?'Recompensa actualizada':'Recompensa creada');
  };
}

<script>
/* ===================================================================
   ADMIN VIEWS — Reportes, Configuración, Superadmin
   =================================================================== */
const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

/* ===== Amortización + ganancia pura por pedido ===== */
// Estima el costo (amortización) de producir un producto: material + electricidad + desgaste de máquina.
function productAmort(p){
  const grams = p.weight || Math.max(20, Math.round((p.price||10000)/350)); // estimación si no hay peso
  const fil = FILAMENTS.find(f=>f.material===p.material);
  const precioKg = fil ? fil.cost : 9000;
  const material = grams/1000 * precioKg;
  const horas = p.printHours || Math.max(0.5, grams/22); // ~22 g/h aprox
  const electricidad = ((CALC_CFG.consumoWatts||220) * (CALC_CFG.precioKwh||95) / 1000) * horas;
  const desgaste = ((CALC_CFG.costoMantenimiento||80000) / (CALC_CFG.vidaUtilHoras||5000)) * horas;
  return { material, electricidad, desgaste, total: material+electricidad+desgaste, grams, horas };
}
function orderEconomics(o){
  let amort=0, ingreso=0, grams=0, horas=0;
  o.items.forEach(it=>{ const p=getProduct(it.p); if(!p) return; const a=productAmort(p); amort += a.total*it.q; grams += a.grams*it.q; horas += a.horas*it.q; });
  ingreso = o.total;
  const gananciaPura = Math.max(0, ingreso - amort);
  return { ingreso, amort, gananciaPura, grams, horas };
}
function sharesTotal(){ return PROFIT_SHARES.reduce((a,s)=>a+(+s.pct||0),0); }

/* ===== Precios dinámicos: el precio se deriva del costo (filamento+luz+máquina) × margen ===== */
const PRICING = (()=>{ try{ const s=JSON.parse(localStorage.getItem('hef-pricing')); if(s) return s; }catch(e){} return { auto:false, round:100 }; })();
function savePricing(){ try{ localStorage.setItem('hef-pricing', JSON.stringify(PRICING)); }catch(e){} }
// margen (%) por categoría usando los presets de la calculadora (tier de 1 unidad); fallback 150%
function productMarginPct(p){
  const presets=CALC_CFG.marginPresets||[];
  const catName=(getCat(p.cat)||{}).name||'';
  let pr = presets.find(x=>x.name.toLowerCase()===catName.toLowerCase());
  if(!pr) pr = presets.find(x=>catName.toLowerCase().includes(x.name.toLowerCase()) || x.name.toLowerCase().includes(catName.toLowerCase()));
  if(!pr) pr = presets[0];
  const tier = pr && pr.tiers ? pr.tiers[0] : null;
  return tier ? tier.margin : 150;
}
// precio sugerido = costo total (amortización) × (1+margen). Redondeo configurable.
function suggestedPrice(p){
  const cost = productAmort(p).total;
  const margin = productMarginPct(p);
  let price = cost * (1 + margin/100);
  const r = PRICING.round||1;
  return Math.max(r, Math.round(price/r)*r);
}
// recalcula precios de los productos con precio dinámico activado; devuelve cuántos cambiaron
function recalcAutoPrices(){
  let changed=0;
  PRODUCTS.forEach(p=>{ if(p.autoPrice){ const np=suggestedPrice(p); if(np!==p.price){ p.price=np; changed++; } if(p.sale && p.sale>=p.price) p.sale=null; } });
  if(changed) savePricing();
  return changed;
}
function autoPriceCount(){ return PRODUCTS.filter(p=>p.autoPrice).length; }
// Reprecia TODOS los productos publicados por el margen de su categoría (salvo los "fijados" a mano)
function recalcStorePrices(){
  let changed=0;
  PRODUCTS.forEach(p=>{ if(p.pinnedPrice) return; const np=suggestedPrice(p); if(np!==p.price){ p.price=np; changed++; } if(p.sale && p.sale>=p.price) p.sale=null; });
  return changed;
}
// Aplica un % de ajuste (inflación) a los factores de costo: filamentos + kWh + mantenimiento
function applyInflation(pct){
  const f=1+(+pct||0)/100;
  FILAMENTS.forEach(fl=>{ fl.cost=Math.round(fl.cost*f); });
  CALC_CFG.precioKwh=Math.round((CALC_CFG.precioKwh||95)*f);
  CALC_CFG.costoMantenimiento=Math.round((CALC_CFG.costoMantenimiento||80000)*f);
  saveFilaments(); saveCalcCfg();
}
// resumen por categoría: cantidad de productos y precio promedio sugerido
function categoryPricing(){
  return CATEGORIES.map(c=>{
    const prods=PRODUCTS.filter(p=>p.cat===c.id);
    const presets=CALC_CFG.marginPresets||[];
    let pr=presets.find(x=>x.name.toLowerCase()===c.name.toLowerCase()) || presets.find(x=>c.name.toLowerCase().includes(x.name.toLowerCase())||x.name.toLowerCase().includes(c.name.toLowerCase())) || presets[0];
    const margin=pr&&pr.tiers?pr.tiers[0].margin:150;
    const avgCost=prods.length?prods.reduce((a,p)=>a+productAmort(p).total,0)/prods.length:0;
    const avgSug=prods.length?prods.reduce((a,p)=>a+suggestedPrice(p),0)/prods.length:0;
    const avgNow=prods.length?prods.reduce((a,p)=>a+p.price,0)/prods.length:0;
    return { c, count:prods.length, margin, avgCost, avgSug, avgNow };
  }).filter(x=>x.count>0);
}

          </div>`).join('')}
        </div>
        <div class="row gap-2" style="margin-top:14px">

    data:{labels:Object.keys(CAT_SALES).map(k=>getCat(k).name),datasets:[{data:Object.values(CAT_SALES),backgroundColor:Object.keys(CAT_SALES).map(k=>getCat(k).color),borderColor:css.getPropertyValue('--surface-1').trim(),borderWidth:3}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,cutout:'62%',
      plugins:{legend:{position:'right',labels:{color:dim,boxWidth:10,padding:12,font:{size:12}}},tooltip:{...tip,callbacks:{label:c=>c.label+': '+c.raw+'%'}}}}});

  const tops=TOP_PRODUCTS.map(getProduct);
  new Chart($('#chart-top'),{type:'bar',
    data:{labels:tops.map(p=>p.name.length>22?p.name.slice(0,20)+'…':p.name),datasets:[{data:tops.map(p=>p.sold),backgroundColor:gold,borderRadius:5,barThickness:18}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{...tip,callbacks:{label:c=>c.raw+' unidades'}}},
      scales:{x:{grid:{color:grid},ticks:{color:dim,font:{size:10}}},y:{grid:{display:false},ticks:{color:text,font:{size:11}}}}}});
};

function storeContentEditors(){
  const ICONS = ['truck','shield','layers','refresh','box','users','star','printer','zap','sparkles','heart','gift','clock','check2','cpu','home','tag','package','palette'];
  const iconSel = (path, val)=>`<select class="select cfg-icon" data-cfg="${path}" style="width:64px;flex-shrink:0">${ICONS.map(i=>`<option value="${i}" ${val===i?'selected':''}>${i}</option>`).join('')}</select>`;
  const inp = (path, val, ph, w)=>`<input class="input" data-cfg="${path}" value="${String(val??'').replace(/"/g,'&quot;')}" placeholder="${ph||''}" ${w?`style="${w}"`:''}/>`;

  const nav = STORE_CONFIG.nav||{};
  const navRows = [['home','Inicio'],['catalog','Catálogo'],['custom','A medida'],['orders','Mis pedidos'],['account','Mi cuenta']].map(([k,def])=>`
    <div class="row gap-2" style="align-items:center">
      ${inp('nav.'+k+'.label', (nav[k]&&nav[k].label)||def, def)}
      <div class="switch ${(!nav[k]||nav[k].on!==false)?'on':''}" data-cfg-toggle="nav.${k}.on"></div>
    </div>`).join('');

  const heroRows = (STORE_CONFIG.heroStats||[]).map((s,i)=>`
    <div class="row gap-2">${inp('heroStats.'+i+'.n', s.n, '3.490+', 'max-width:110px')}${inp('heroStats.'+i+'.l', s.l, 'Etiqueta')}</div>`).join('');

  const trustRows = (STORE_CONFIG.trust||[]).map((t,i)=>`
    <div class="cfg-row">${iconSel('trust.'+i+'.ic', t.ic)}<div class="col gap-1 grow">${inp('trust.'+i+'.t', t.t, 'Título')}${inp('trust.'+i+'.d', t.d, 'Descripción')}</div></div>`).join('');

  const statRows = (STORE_CONFIG.statsNums||[]).map((s,i)=>`
    <div class="cfg-row">${iconSel('statsNums.'+i+'.ic', s.ic)}<div class="row gap-2 grow">${inp('statsNums.'+i+'.n', s.n, '3490', 'max-width:90px')}${inp('statsNums.'+i+'.suf', s.suf, '+', 'max-width:54px')}${inp('statsNums.'+i+'.l', s.l, 'Etiqueta')}</div></div>`).join('');

  const stepRows = (STORE_CONFIG.steps||[]).map((s,i)=>`
    <div class="cfg-row">${iconSel('steps.'+i+'.ic', s.ic)}<div class="col gap-1 grow">${inp('steps.'+i+'.t', s.t, 'Título del paso')}${inp('steps.'+i+'.d', s.d, 'Descripción')}</div></div>`).join('');

  const block = (title, icon_, sub, body)=>`
    <div class="card section-card col gap-3">
      <div><div class="section-title row gap-2">${icon(icon_)} ${title}</div>${sub?`<div class="faint" style="font-size:12.5px;margin-top:3px">${sub}</div>`:''}</div>
      ${body}

    </div>

  `);
  let img=b.image||'';
  $$('[data-act="close"]').forEach(x=>x.onclick=closeModal);
  $$('#bn-align [data-bnalign]').forEach(x=>x.onclick=()=>{ $$('#bn-align .chip').forEach(c=>c.classList.toggle('active',c===x)); });
  const linkSel=$('#bn-link'); if(linkSel) linkSel.onchange=()=>{ const w=$('#bn-url-wrap'); if(w) w.style.display = linkSel.value==='url' ? '' : 'none'; };
  const file=$('#bn-file'), prev=$('#bn-preview'), ovWrap=$('#bn-overlay-wrap'), clr=$('#bn-clear-btn'), drop=$('#bn-drop'), posWrap=$('#bn-pos-wrap');
  // posición como "X% Y%" (compatibilidad con keywords viejos → center)
  let imgPos = (b.imgPos && b.imgPos.includes('%')) ? b.imgPos : '50% 50%';
  const setImg=(data)=>{ img=data; prev.style.backgroundImage=`url('${data}')`; prev.style.backgroundSize='cover'; prev.style.backgroundPosition=imgPos; prev.innerHTML=''; prev.classList.add('draggable'); ovWrap.style.display=''; clr.style.display=''; posWrap.style.display=''; const w3=$('#bn-3d-wrap'); if(w3) w3.style.display=''; const hb=$('#bn-hef-btn'); if(hb) hb.style.display=''; };
  const readFile=(f)=>{ if(!f||!f.type.startsWith('image/'))return; const r=new FileReader(); r.onload=e=>setImg(e.target.result); r.readAsDataURL(f); };
  if(img){ prev.classList.add('draggable'); }
  $('[data-act="bn-upload"]').onclick=()=>file.click();
  const hefBtn=$('[data-act="bn-hef"]');
  if(hefBtn) hefBtn.onclick=()=>{
    if(!img){ toast('Subí una imagen primero','danger'); return; }
    const orig=hefBtn.innerHTML; hefBtn.innerHTML='<span class="pay-spin" style="width:16px;height:16px;border-width:2px"></span> Optimizando...'; hefBtn.style.pointerEvents='none';
    const im=new Image();
    im.onload=()=>{
      const TW=1600, TH=600; // ratio 8:3 ideal
      const cv=document.createElement('canvas'); cv.width=TW; cv.height=TH;
      const ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
      // recorte tipo "cover" respetando el encuadre elegido (imgPos)
      const ir=im.width/im.height, tr=TW/TH;
      let sw,sh2,sx,sy;
      const pos=imgPos.match(/(\d+)%\s+(\d+)%/); const fx=pos?(+pos[1])/100:0.5, fy=pos?(+pos[2])/100:0.5;
      if(ir>tr){ sh2=im.height; sw=im.height*tr; sx=(im.width-sw)*fx; sy=0; }
      else { sw=im.width; sh2=im.width/tr; sx=0; sy=(im.height-sh2)*fy; }
      ctx.drawImage(im, sx, sy, sw, sh2, 0, 0, TW, TH);
      // leve realce de contraste/saturación para que quede "de calidad"
      try{ ctx.globalCompositeOperation='overlay'; ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fillRect(0,0,TW,TH); ctx.globalCompositeOperation='source-over'; }catch(e){}
      const out=cv.toDataURL('image/jpeg', 0.92);
      imgPos='50% 50%';
      setImg(out);
      hefBtn.innerHTML=orig; hefBtn.style.pointerEvents='';
      toast('Imagen optimizada a 1600×600 ✨');
    };
    im.onerror=()=>{ hefBtn.innerHTML=orig; hefBtn.style.pointerEvents=''; toast('No se pudo procesar la imagen','danger'); };
    im.src=img;
  };
  drop.ondragover=(e)=>{ e.preventDefault(); if(!img) drop.classList.add('drag'); };
  drop.ondragleave=()=>drop.classList.remove('drag');
  drop.ondrop=(e)=>{ e.preventDefault(); drop.classList.remove('drag'); readFile(e.dataTransfer.files[0]); };
  file.onchange=()=>readFile(file.files[0]);
  // si no hay imagen, clic abre el selector; si hay, el clic se usa para arrastrar
  prev.onclick=()=>{ if(!img) file.click(); };
  // arrastrar para reposicionar el encuadre
  let dragging=false;
  const applyFromEvent=(clientX,clientY)=>{
    const r=prev.getBoundingClientRect();
    let px=Math.min(Math.max((clientX-r.left)/r.width,0),1);
    let py=Math.min(Math.max((clientY-r.top)/r.height,0),1);
    // invertir: arrastrar hacia un lado muestra ese lado (background-position)
    imgPos=`${Math.round(px*100)}% ${Math.round(py*100)}%`;
    prev.style.backgroundPosition=imgPos;
  };
  prev.addEventListener('pointerdown',(e)=>{ if(!img)return; dragging=true; prev.setPointerCapture(e.pointerId); prev.classList.add('grabbing'); applyFromEvent(e.clientX,e.clientY); });
  prev.addEventListener('pointermove',(e)=>{ if(dragging) applyFromEvent(e.clientX,e.clientY); });
  prev.addEventListener('pointerup',(e)=>{ dragging=false; prev.classList.remove('grabbing'); });
  prev.addEventListener('pointercancel',()=>{ dragging=false; prev.classList.remove('grabbing'); });
  $('[data-act="bn-clear"]').onclick=(e)=>{ e.stopPropagation(); img=''; imgPos='50% 50%'; prev.style.backgroundImage=''; prev.classList.remove('draggable'); prev.innerHTML=`${icon('box')}<span>Arrastrá una imagen o hacé clic para subir</span>`; ovWrap.style.display='none'; clr.style.display='none'; posWrap.style.display='none'; const w3=$('#bn-3d-wrap'); if(w3) w3.style.display='none'; };
  const ov=$('#bn-overlay'); ov.oninput=()=>{ $('#bn-overlay-v').textContent=ov.value+'%'; };
  const sw3d=$('#bn-3d'); if(sw3d) sw3d.onclick=function(){ this.classList.toggle('on'); };
  $('[data-act="save"]').onclick=()=>{
    const title=$('#bn-title').value.trim();
    if(!title){ toast('Ingresá un título','danger'); return; }
    const data={ id:b.id, title, sub:$('#bn-sub').value.trim(), cta:$('#bn-cta').value.trim(), ctaLink:$('#bn-link').value, ctaUrl:$('#bn-url').value.trim(), align:$('#bn-align .chip.active')?.dataset.bnalign||'left', image:img, overlay:+$('#bn-overlay').value, imgPos, spin3d: img && $('#bn-3d').classList.contains('on') };
    if(!STORE_CONFIG.heroBanners) STORE_CONFIG.heroBanners=[];
    if(edit){ const i=STORE_CONFIG.heroBanners.findIndex(x=>x.id===b.id); if(i>=0) STORE_CONFIG.heroBanners[i]=data; } else { STORE_CONFIG.heroBanners.push(data); }
    saveStoreCfg(); closeModal(); $('#content').innerHTML=ViewConfig(); VIEW_WIRE.config(); toast(edit?'Banner actualizado':'Banner agregado');
  };
}

      <div class="table-wrap">
        <table class="tbl"><thead><tr><th>Módulo</th>${perms.map(p=>`<th style="text-align:center;text-transform:capitalize">${p}</th>`).join('')}</tr></thead>
        <tbody>${modules.map(([mid,ml])=>{
          const allow = r.perms==='all' ? perms : (r.perms[mid]||[]);
          return `<tr style="cursor:default">${`<td><b style="font-weight:500">${ml}</b></td>`}${perms.map(p=>`<td style="text-align:center"><div class="check ${allow.includes(p)?'on':''}" data-perm="${r.id}-${mid}-${p}" style="margin:0 auto">${allow.includes(p)?icon('check'):''}</div></td>`).join('')}</tr>`;
        }).join('')}</tbody></table>
      </div>
    </div>`).join('')}
  </div>`;
}

function genPassword(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
  let p='Hef-'; for(let i=0;i<8;i++) p+=chars[Math.floor(Math.random()*chars.length)];
  return p;
}

    const attr = opts.act ? `data-act="${opts.act}"` : `data-snav="${view}"`;
    const badge = opts.badge ? `<span class="snav-badge">${opts.badge}</span>` : '';
    return `<a class="store-nav-link ${active?'active':''} ${opts.cls||''}" ${attr}>${ic?icon(ic):''}<span>${label}</span>${badge}</a>`;
  };
  const items = [];
  if(on('home'))    items.push(it('home', lbl('home','Inicio'),'home'));
  if(on('catalog')) items.push(it('catalog', lbl('catalog','Catálogo'),'store',{active:State.storeView==='catalog'&&State.catalogFilters.cat==='all'}));
  if(on('custom'))  items.push(it('custom', lbl('custom','A medida'),'sparkles',{act:'nav-custom',cls:'gold',badge:customUnreadReplies()||''}));
  if(on('orders'))  items.push(it('orders', lbl('orders','Mis pedidos'),'package',{cls:'push'}));
  if(on('account')) items.push(it('account', lbl('account','Mi cuenta'),'users'));
  return `<div class="store-subnav">
    <div class="store-wrap">
      <nav class="store-nav">${items.join('')}</nav>
    </div>
  </div>`;
}

function heroTitleHtml(t){
  const words=(t||'').trim().split(' ');

function heroCarousel(banners){
  if(!banners.length) return '';
  return `<section class="hero-carousel" id="hero-carousel">

      ${banners.map((b,i)=>heroSlide(b,i)).join('')}

  </section>`;
}
let _hcTimer=null, _hcIdx=0;
function initHeroCarousel(){
  if(_hcTimer){ clearInterval(_hcTimer); _hcTimer=null; }
  const sec=$('#hero-carousel'); if(!sec) return;
  const slides=$$('.hc-slide', sec); if(slides.length<=1) return;
  _hcIdx=0;
  const go=(n)=>{ _hcIdx=(n+slides.length)%slides.length; slides.forEach((s,i)=>s.classList.toggle('on',i===_hcIdx)); $$('.hc-dot',sec).forEach((d,i)=>d.classList.toggle('on',i===_hcIdx)); };
  const prev=$('[data-hc-prev]',sec), next=$('[data-hc-next]',sec);
  if(prev) prev.onclick=()=>{ go(_hcIdx-1); reset(); };
  if(next) next.onclick=()=>{ go(_hcIdx+1); reset(); };
  $$('[data-hc-dot]',sec).forEach(d=>d.onclick=()=>{ go(+d.dataset.hcDot); reset(); });
  const reset=()=>{ if(_hcTimer)clearInterval(_hcTimer); _hcTimer=setInterval(()=>go(_hcIdx+1),5500); };
  reset();
}
let _phTimer=null;
function initPrevHeroCarousel(){
  if(_phTimer){ clearInterval(_phTimer); _phTimer=null; }
  const wrap=$('#prev-hero-carousel'); if(!wrap) return;
  const slides=$$('.prev-hslide', wrap); if(slides.length<=1) return;
  const dots=$$('.prev-hc-dots span', wrap); let idx=0;
  _phTimer=setInterval(()=>{ idx=(idx+1)%slides.length; slides.forEach((s,i)=>s.classList.toggle('on',i===idx)); dots.forEach((d,i)=>d.classList.toggle('on',i===idx)); }, 3000);
}
function photoCube(src, cls){
  const N=20, step=2.2, half=(N-1)*step/2;
  let layers='';
  for(let i=0;i<N;i++){
    const z=(i*step-half).toFixed(1);
    const edge = (i!==0 && i!==N-1);
    layers += `<img class="p3d-layer${edge?' p3d-edge':''}" src="${src}" alt="" style="transform:translateZ(${z}px)"/>`;
  }
  return `<div class="scene photo3d-scene ${cls||''}">
    <div class="photo3d-stage">
      <div class="photo3d">${layers}<span class="p3d-gloss"></span></div>
    </div>
    <div class="photo3d-shadow"></div>
  </div>`;
}
function heroCtaBtn(b){
  const link=b.ctaLink||'catalog';
  let attr='data-snav="catalog"';
  if(link==='sale') attr='data-sfilter="sale"';
  else if(link==='custom') attr='data-act="nav-custom"';
  else if(link==='url'){ const u=b.ctaUrl||'#'; return `<a class="btn btn-primary btn-lg" href="${u}" target="_blank" rel="noopener">${icon('cart')} ${b.cta}</a>`; }
  else if(link && link.startsWith('cat:')) attr=`data-scat="${link.slice(4)}"`;
  return `<button class="btn btn-primary btn-lg" ${attr}>${icon('cart')} ${b.cta}</button>`;
}
function heroSlide(b,i){
  const hasImg=!!b.image;

        ${b.sub?`<p class="hero-sub">${b.sub}</p>`:''}

      ${(!hasImg)?`<div class="scene"><div class="cube">

      <div><h5>Ayuda</h5><a data-act="foot-envios">Envíos y devoluciones</a><a data-snav="account">Seguir mi pedido</a><a data-act="foot-faq">Preguntas frecuentes</a><a data-act="foot-custom">Pedidos personalizados</a></div>
      <div><h5>Contacto</h5>
        <a class="row gap-2" data-act="foot-wa">${icon('whatsapp')} ${b.whatsapp||''}</a>
        <a class="row gap-2" data-act="foot-mail">${icon('users')} ${b.email||''}</a>
        <a class="row gap-2" data-act="foot-maps">${icon('home')} ${b.address||''}</a>
      </div>
    </div>
