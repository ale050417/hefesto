      <span>© 2026 Hefesto 3D · ${b.copyright||''}</span>
      <span class="row gap-3"><a data-act="foot-terms" style="cursor:pointer">Políticas</a><a data-act="foot-priv" style="cursor:pointer">Privacidad</a><a data-act="admin-access" style="cursor:pointer;color:var(--gold-bright)">${icon('shield')} Panel de gestión</a></span>
    </div>
  </div></footer>`;
}

/* ---------- cart logic ---------- */
function addToCart(id, q=1, color=null){
  // líneas con distinto color son ítems separados
  const line=State.cart.find(i=>i.id===id && (i.color||null)===(color||null));
  if(line) line.q+=q; else State.cart.push(color?{id,q,color}:{id,q});
  saveCart(); toast(color?('Agregado · color '+color):'Agregado al carrito');
  // update header badge without full rerender
  const b=$('[data-act="open-cart"] .nbadge');
  if(b) b.textContent=cartCount(); else { const btn=$('[data-act="open-cart"]'); if(btn) btn.insertAdjacentHTML('beforeend',`<span class="nbadge">${cartCount()}</span>`); }
}
let appliedCoupon=null;
function couponDiscount(sub){
  if(!appliedCoupon) return 0;
  return appliedCoupon.type==='pct' ? Math.round(sub*appliedCoupon.value/100) : appliedCoupon.value;
}
function updateWishBadge(){
  const btn=$('[data-act="open-wish"]'); if(!btn) return;
  let b=$('.nbadge',btn);
  if(State.wishlist.length){ if(b) b.textContent=State.wishlist.length; else btn.insertAdjacentHTML('beforeend',`<span class="nbadge">${State.wishlist.length}</span>`); }
  else if(b) b.remove();
}

function openWishlist(){
  const favs=State.wishlist.map(getProduct).filter(Boolean);
  openDrawer(`
    <div class="row between" style="padding:18px 22px;border-bottom:1px solid var(--border)">
      <div class="section-title row gap-2" style="color:var(--text)"><span style="color:var(--danger)">${icon('heart')}</span> Favoritos ${favs.length?`<span class="badge badge-gold">${favs.length}</span>`:''}</div>
      <button class="icon-btn" data-act="close-drawer">${icon('x')}</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:0 22px">
      ${favs.length===0?`<div class="empty">${icon('heart')}<div>No tenés favoritos todavía</div><div class="faint" style="font-size:12.5px;max-width:240px;margin:8px auto 0">Tocá el ♥ en cualquier producto para guardarlo acá.</div><button class="btn btn-secondary" style="margin-top:16px" data-act="go-catalog">Ver catálogo</button></div>`:
        favs.map(p=>{ const cat=getCat(p.cat); return `<div class="cart-line">
          <div class="ph" data-label="" data-open-prod="${p.id}" style="cursor:pointer"></div>
          <div class="grow">
            <div style="font-weight:600;font-size:13.5px;cursor:pointer" data-open-prod="${p.id}">${p.name}</div>
            <div class="faint" style="font-size:12px">${cat.name}</div>
            <div class="row between" style="margin-top:8px">
              <b class="price" style="color:var(--gold-bright)">${fmt(priceOf(p))}</b>
              <button class="btn btn-primary btn-sm" data-wish-add="${p.id}">${icon('cart')} Agregar</button>
            </div>
          </div>
          <button class="btn-icon btn-ghost" data-wish-rm="${p.id}" title="Quitar de favoritos" style="align-self:flex-start;color:var(--danger)">${icon('heart')}</button>
        </div>`;}).join('')}
    </div>
    ${favs.length?`<div style="padding:16px 22px;border-top:1px solid var(--border)" class="col gap-2">
      <button class="btn btn-primary btn-lg btn-block" data-act="wish-all">${icon('cart')} Agregar todo al carrito</button>
      <button class="btn btn-ghost btn-block" data-act="wish-clear">Vaciar favoritos</button>
    </div>`:''}
  `);
  $('[data-act="close-drawer"]').onclick=closeDrawer;
  const gc=$('[data-act="go-catalog"]'); if(gc) gc.onclick=()=>{ closeDrawer(); State.storeView='catalog'; render(); };
  $$('[data-open-prod]').forEach(b=>b.onclick=()=>{ closeDrawer(); State.selectedProduct=b.dataset.openProd; State.storeView='product'; window.scrollTo(0,0); render(); });
  $$('[data-wish-add]').forEach(b=>b.onclick=()=>{ addToCart(b.dataset.wishAdd); });
  $$('[data-wish-rm]').forEach(b=>b.onclick=()=>{
    State.wishlist=State.wishlist.filter(x=>x!==b.dataset.wishRm); saveWish(); updateWishBadge();
    if(State.storeView==='home'&&$('#fav-section')){ const sc=window.scrollY; $('#store-root').innerHTML=storeView(); wireStore(); window.scrollTo(0,sc); }
    openWishlist();
  });
  const wa=$('[data-act="wish-all"]'); if(wa) wa.onclick=()=>{ favs.forEach(p=>{ if(!State.cart.find(i=>i.id===p.id)) State.cart.push({id:p.id,q:1}); }); saveCart(); render(); toast('Favoritos agregados al carrito'); setTimeout(openCart,80); };
  const wc=$('[data-act="wish-clear"]'); if(wc) wc.onclick=()=>{ State.wishlist=[]; saveWish(); updateWishBadge(); if(State.storeView==='home'){ const sc=window.scrollY; $('#store-root').innerHTML=storeView(); wireStore(); window.scrollTo(0,sc);} openWishlist(); };
}

function openCart(){
  const sub=cartSubtotal(); const disc=couponDiscount(sub); const shipping = sub>30000||sub===0?0:5000; const total=Math.max(sub-disc+shipping,0);
  openDrawer(`
    <div class="row between" style="padding:18px 22px;border-bottom:1px solid var(--border)">
      <div class="section-title row gap-2">${icon('cart')} Tu carrito ${cartCount()?`<span class="badge badge-gold">${cartCount()}</span>`:''}</div>
      <button class="icon-btn" data-act="close-drawer">${icon('x')}</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:0 22px">
      ${State.cart.length===0?`<div class="empty">${icon('cart')}<div>Tu carrito está vacío</div><button class="btn btn-secondary" style="margin-top:16px" data-act="go-catalog">Ver catálogo</button></div>`:
        State.cart.map((i,idx)=>{ const p=getProduct(i.id); const fc=i.color?FILAMENT_COLORS.find(x=>x.n===i.color):null; const lp=linePrice(i); const sur=colorSurcharge(p,i.color); return `<div class="cart-line">
          <div class="ph" data-label=""></div>
          <div class="grow"><div style="font-weight:600;font-size:13.5px">${p.name}</div>
          <div class="faint" style="font-size:12px">${fmt(lp)} c/u${sur?` <span style="color:var(--gold-bright)">(${sur>0?'+':''}${fmt(sur)} color)</span>`:''}</div>
          ${i.color?`<div class="row gap-2" style="align-items:center;font-size:11.5px;color:var(--text-dim);margin-top:4px"><span style="width:11px;height:11px;border-radius:50%;background:${fc?fc.c:'#888'};border:1px solid rgba(255,255,255,.25);display:inline-block"></span>${i.color}</div>`:''}
          <div class="row between" style="margin-top:8px">
            <div class="qty"><button data-dec="${idx}">${icon('minus')}</button><span>${i.q}</span><button data-inc="${idx}">${icon('plus')}</button></div>
            <b class="price">${fmt(lp*i.q)}</b>
          </div></div>
          <button class="btn-icon btn-ghost" data-rm="${idx}" style="align-self:flex-start">${icon('x')}</button>
        </div>`;}).join('')}
    </div>
    ${State.cart.length?`<div style="padding:18px 22px;border-top:1px solid var(--border)" class="col gap-3">
      <div class="row gap-2"><input class="input" id="cart-coupon" placeholder="Código de descuento" value="${appliedCoupon?appliedCoupon.code:''}"/><button class="btn btn-secondary" data-act="apply-coupon">Aplicar</button></div>
      ${appliedCoupon?`<div class="row between" style="font-size:13px;color:var(--success)"><span class="row gap-2">${icon('gift')} ${appliedCoupon.code}</span><span>-${fmt(disc)}</span></div>`:''}
      <div class="col gap-2" style="font-size:13.5px">
        <div class="row between muted"><span>Subtotal</span><span class="price">${fmt(sub)}</span></div>
        <div class="row between muted"><span>Envío</span><span class="price">${shipping?fmt(shipping):'Gratis'}</span></div>
        <div class="row between" style="font-size:17px;font-weight:700;padding-top:8px;border-top:1px solid var(--border)"><span>Total</span><span class="price" style="color:var(--gold-bright)">${fmt(total)}</span></div>
      </div>
      <button class="btn btn-primary btn-lg btn-block" data-act="checkout">${icon('arrowRight')} Finalizar compra</button>
    </div>`:''}
  `);
  $('[data-act="close-drawer"]').onclick=closeDrawer;
  $$('[data-inc]').forEach(b=>b.onclick=()=>{ State.cart[+b.dataset.inc].q++; saveCart(); openCart(); });
  $$('[data-dec]').forEach(b=>b.onclick=()=>{ const idx=+b.dataset.dec; State.cart[idx].q--; if(State.cart[idx].q<=0)State.cart.splice(idx,1); saveCart(); openCart(); });
  $$('[data-rm]').forEach(b=>b.onclick=()=>{ State.cart.splice(+b.dataset.rm,1); saveCart(); openCart(); render(); });
  const ac=$('[data-act="apply-coupon"]'); if(ac) ac.onclick=()=>{
    const code=$('#cart-coupon').value.trim().toUpperCase();
    const cp=COUPONS.find(c=>c.code===code&&c.status==='activo');
    if(cp){ appliedCoupon=cp; toast('Cupón aplicado: '+code); openCart(); } else { toast('Cupón inválido o expirado','danger'); }
  };
  const gc=$('[data-act="go-catalog"]'); if(gc) gc.onclick=()=>{ closeDrawer(); State.storeView='catalog'; render(); };
  const co=$('[data-act="checkout"]'); if(co) co.onclick=()=>{ closeDrawer(); requireLogin(()=>{ const c=currentCustomer(); coStep=1; coData={ method:'pickup', zone:'', address:'', maps:'', pay:'mp', name:c?c.name.split(' ')[0]:'', last:c?c.name.split(' ').slice(1).join(' '):'', phone:c?(c.phone||''):'' }; State.storeView='checkout'; window.scrollTo(0,0); render(); }); };
}
</script>

<script>
/* ===================================================================
   STOREFRONT — catalog, product detail, checkout, account
   =================================================================== */
function StoreCatalog(){
  const f=State.catalogFilters;
  const q=(f.q||'').trim();
  let list = q ? searchProducts(q) : PRODUCTS.filter(p=>p.status==='activo');
  if(f.cat!=='all') list=list.filter(p=>p.cat===f.cat);
  if(f.onlyNew) list=list.filter(p=>p.tags.includes('nuevo'));
  if(f.onlySale) list=list.filter(p=>p.sale);
  if(f.material!=='all') list=list.filter(p=>p.material===f.material);
  list=list.filter(p=>priceOf(p)<=f.maxPrice);
  // si hay búsqueda, el orden por relevancia ya viene aplicado; respetamos otros sorts si se eligen
  if(f.sort==='price-asc') list.sort((a,b)=>priceOf(a)-priceOf(b));
  else if(f.sort==='price-desc') list.sort((a,b)=>priceOf(b)-priceOf(a));
  else if(f.sort==='sold') list.sort((a,b)=>b.sold-a.sold);
  else if(f.sort==='new') list.sort((a,b)=>(b.tags.includes('nuevo')?1:0)-(a.tags.includes('nuevo')?1:0));
  const materials=[...new Set(PRODUCTS.map(p=>p.material))];
  const title = q ? `Resultados para "${q}"` : (f.cat==='all'?'Todo el catálogo':getCat(f.cat).name);

  return `<div class="view">
    ${storeSubnav()}
    <div class="store-wrap store-section" style="padding-top:32px">
      <div class="sec-head"><div><div class="eyebrow">${q?'Búsqueda':'Tienda'}</div><h2 class="sec-title">${title}</h2><div class="sec-sub">${list.length} ${list.length===1?'producto':'productos'}${q?'<a class="cat-clearq" data-act="clear-q"> · limpiar búsqueda</a>':''}</div></div>
        <select class="select" style="width:auto" id="cat-sort">
          <option value="rel" ${f.sort==='rel'?'selected':''}>Relevancia</option>
          <option value="new" ${f.sort==='new'?'selected':''}>Novedades</option>
          <option value="sold" ${f.sort==='sold'?'selected':''}>Más vendidos</option>
          <option value="price-asc" ${f.sort==='price-asc'?'selected':''}>Precio: menor a mayor</option>
          <option value="price-desc" ${f.sort==='price-desc'?'selected':''}>Precio: mayor a menor</option>
        </select>
      </div>
      <div class="catalog-grid">
        <aside class="filter-panel card" style="padding:20px">
          <div class="row between" style="margin-bottom:6px"><b style="font-size:14px">${icon('filter')} Filtros</b><button class="btn-ghost btn-sm" data-act="clear-filters" style="color:var(--gold-bright);font-size:12px">Limpiar</button></div>
          <div class="filter-group"><h5>Categoría</h5>
            <div class="f-radio ${f.cat==='all'?'on':''}" data-fcat="all"><span class="rdot"></span>Todas</div>
            ${CATEGORIES.map(c=>`<div class="f-radio ${f.cat===c.id?'on':''}" data-fcat="${c.id}"><span class="rdot"></span>${c.name}</div>`).join('')}
          </div>
          <div class="filter-group"><h5>Precio máximo</h5>
            <input type="range" class="range" id="f-price-range" min="3000" max="50000" step="1000" value="${f.maxPrice}"/>
            <div class="row between faint" style="font-size:12px;margin-top:6px"><span>$3.000</span><b style="color:var(--gold-bright)">${fmt(f.maxPrice)}</b></div>
          </div>
          <div class="filter-group"><h5>Material</h5>
            <select class="select" id="f-material"><option value="all">Todos</option>${materials.map(m=>`<option ${f.material===m?'selected':''}>${m}</option>`).join('')}</select>
          </div>
          <div class="filter-group"><h5>Destacados</h5>
            <div class="row between" style="padding:6px 0"><span style="font-size:13.5px;color:var(--text-dim)">Solo novedades</span><div class="switch ${f.onlyNew?'on':''}" data-ftoggle="onlyNew"></div></div>
            <div class="row between" style="padding:6px 0"><span style="font-size:13.5px;color:var(--text-dim)">Solo ofertas</span><div class="switch ${f.onlySale?'on':''}" data-ftoggle="onlySale"></div></div>
          </div>
        </aside>
        <div>
          ${list.length
            ? `<div class="grid-3 stagger">${list.map(storeProdCard).join('')}</div>`
            : `<div class="empty card section-card" style="padding:48px 24px">${icon('search')}<div style="font-weight:600;margin-bottom:6px">${q?`Sin resultados para "${q}"`:'No hay productos con estos filtros'}</div><div class="faint" style="font-size:13px;max-width:380px;margin:0 auto 16px">${q?'Probá con otra palabra, revisá la ortografía o explorá por categoría.':'Ajustá los filtros para ver más productos.'}</div>${q?`<button class="btn btn-secondary btn-sm" data-act="clear-q">${icon('x')} Limpiar búsqueda</button>`:''}</div>`}
        </div>
      </div>
    </div>
    ${storeFooter()}
  </div>`;
}

function StoreProduct(){
  const p=getProduct(State.selectedProduct)||PRODUCTS[0];
  const cat=getCat(p.cat); const off=p.sale?Math.round((1-p.sale/p.price)*100):0;
  const related=PRODUCTS.filter(r=>r.cat===p.cat&&r.id!==p.id).slice(0,4);
  const fav=State.wishlist.includes(p.id);
  return `<div class="view">
    ${storeSubnav()}
    <div class="store-wrap" style="padding-top:28px">
      <div class="row gap-2 faint" style="font-size:13px;margin-bottom:24px">
        <a data-snav="catalog" style="cursor:pointer">Catálogo</a> ${icon('chevronRight','')} <a data-scat="${p.cat}" style="cursor:pointer">${cat.name}</a> ${icon('chevronRight','')} <span style="color:var(--text)">${p.name}</span>
      </div>
      <div class="pd-grid">
        <div class="pd-gallery">
          <div class="ph" style="aspect-ratio:1" data-label="${p.name}" id="pd-main"></div>
          <div class="pd-thumbs">${[0,1,2,3].map(i=>`<div class="ph pd-thumb ${i===0?'on':''}" data-thumb="${i}" data-label=""></div>`).join('')}</div>
        </div>
        <div>
          <div class="row gap-2" style="margin-bottom:12px">
            <span class="prod-cat">${cat.name}</span>
            ${p.tags.includes('bestseller')?badge('Más vendido','gold'):''}
            ${p.tags.includes('nuevo')?badge('Nuevo','info'):''}
          </div>
          <h1 class="display" style="font-size:34px;line-height:1.1;margin-bottom:12px">${p.name}</h1>
          <div class="row gap-3" style="margin-bottom:18px">
            <span class="row gap-2" style="color:var(--gold)">${Array(5).fill(icon('star')).join('')}</span>
            <span class="faint" style="font-size:13px">${p.rating} · ${p.sold} vendidos</span>
          </div>
          <div class="row gap-3" style="align-items:baseline;margin-bottom:20px" id="pd-price">
            ${p.sale?`<span class="display" style="font-size:36px;color:var(--gold-bright)">${fmt(p.sale)}</span><span class="strike price" style="font-size:20px">${fmt(p.price)}</span>${badge('-'+off+'%','danger')}`:`<span class="display" style="font-size:36px">${fmt(p.price)}</span>`}
          </div>
          <p class="muted" style="font-size:15px;line-height:1.65;margin-bottom:24px">${p.desc}</p>

          ${(p.colors&&p.colors.length)? (p.colorMode==='multi' ? `<div style="margin-bottom:24px">
            <div class="row gap-2" style="margin-bottom:10px;align-items:center"><span style="font-size:13px;font-weight:600;color:var(--text-dim)">${icon('layers')} Pieza multicolor</span>${badge('Combinación fija','gold')}</div>
            <div class="row gap-2 wrap">${p.colors.map(cn=>{ const fc=FILAMENT_COLORS.find(x=>x.n===cn); return `<span class="row gap-2" style="align-items:center;font-size:12.5px;color:var(--text-dim);padding:6px 11px;border:1px solid var(--border-strong);border-radius:999px"><span style="width:13px;height:13px;border-radius:50%;background:${fc?fc.c:'#888'};border:1px solid rgba(255,255,255,.25)"></span>${cn}</span>`;}).join('')}</div>
            <div class="faint" style="font-size:12px;margin-top:8px">Esta pieza se imprime con todos estos colores combinados.</div>
          </div>` : `<div style="margin-bottom:24px">
            <div class="row between" style="margin-bottom:10px"><span style="font-size:13px;font-weight:600;color:var(--text-dim)">Color del filamento</span><span class="faint" style="font-size:12.5px" id="pd-color-label">${p.colors[0]}${colorSurcharge(p,p.colors[0])?` · ${colorSurcharge(p,p.colors[0])>0?'+':''}${fmt(colorSurcharge(p,p.colors[0]))}`:''}</span></div>
            <div class="row gap-2 wrap" id="pd-colors">
              ${p.colors.map((cn,i)=>{ const fc=FILAMENT_COLORS.find(x=>x.n===cn); const sur=colorSurcharge(p,cn); return `<button class="color-swatch ${i===0?'on':''}" data-color="${cn}" title="${cn}${sur?(sur>0?' +'+fmt(sur):' '+fmt(sur)):''}" style="--sw:${fc?fc.c:'#888'}"><span class="sw-dot"></span>${sur>0?'<span class="sw-plus">+</span>':''}</button>`;}).join('')}
            </div>
          </div>`):''}

          <div class="col gap-2" style="margin-bottom:24px">
            <div class="row gap-3 wrap">
              <div class="qty"><button data-pd-dec>${icon('minus')}</button><span id="pd-qty">1</span><button data-pd-inc>${icon('plus')}</button></div>
              <button class="btn btn-secondary btn-lg grow" data-pd-add="${p.id}" style="min-width:160px">${icon('cart')} Agregar al carrito</button>
              <button class="btn btn-secondary btn-icon btn-lg ${fav?'on':''}" data-fav="${p.id}" style="${fav?'color:var(--danger)':''}">${icon('heart')}</button>
            </div>
            <button class="btn btn-primary btn-lg btn-block" data-pd-buy="${p.id}">${icon('bolt')} Comprar ahora</button>
          </div>

          <div class="card" style="padding:18px">
            <div class="section-title" style="font-size:14px;margin-bottom:8px">Especificaciones técnicas</div>
            <div class="spec-row"><span class="k">Material</span><span class="v">${p.material}</span></div>

            ${p.infill!=null&&p.infill!==''?`<div class="spec-row"><span class="k">Relleno (infill)</span><span class="v">${p.infill}%</span></div>`:''}
            ${(p.dimH||p.dimW||p.dimD)?`<div class="spec-row"><span class="k">Dimensiones</span><span class="v">${[p.dimH,p.dimW,p.dimD].filter(Boolean).join(' × ')} cm</span></div>`:''}

            <div class="spec-row"><span class="k">Tiempo de producción</span><span class="v">${p.prodTime || (p.printHours?p.printHours+' hs de impresión':'24-48 hs')}</span></div>
            <div class="spec-row"><span class="k">Acabado</span><span class="v">Profesional · post-procesado</span></div>
          </div>
          <div class="row gap-2 faint" style="font-size:13px;margin-top:16px">${icon('truck')} Envío gratis en compras superiores a $30.000 · Devolución hasta 30 días</div>

/* ---------- store wiring ---------- */
function animateStoreStats(){
  const nodes=$$('[data-statcount]'); if(!nodes.length) return;
  const run=(node)=>{
    const raw=node.dataset.statcount, suf=node.dataset.statsuf||'';
    const dec = raw.includes('.') ? 1 : 0;
    const to = parseFloat(raw); const start=performance.now(); const dur=1300;
    function step(now){
      const t=Math.min((now-start)/dur,1); const e=1-Math.pow(1-t,3);
      const v=to*e;
      node.textContent=(dec?v.toFixed(1):Math.round(v).toLocaleString('es-AR'))+suf;
      if(t<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  };
  if('IntersectionObserver' in window){
    const io=new IntersectionObserver((ents)=>{ ents.forEach(en=>{ if(en.isIntersecting){ run(en.target); io.unobserve(en.target); } }); },{threshold:.4});
    nodes.forEach(n=>io.observe(n));
  } else nodes.forEach(run);
}

function waUrl(msg){
  const raw=(STORE_CONFIG.brand.whatsapp||'').replace(/[^\d]/g,'');
  const num = raw ? (raw.length<=10 ? '54'+raw : raw) : '';
  return 'https://wa.me/'+num+(msg?'?text='+encodeURIComponent(msg):'');
}
function igUrl(){
  const h=(STORE_CONFIG.brand.instagram||'').replace(/^@/,'').trim();
  return h.startsWith('http') ? h : 'https://instagram.com/'+h;
}
function mapsUrl(){
  const sh=STORE_CONFIG.shipping||{};
  if(sh.storeMaps) return sh.storeMaps;
  const addr=sh.storeAddress||STORE_CONFIG.brand.address||'';
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(addr);
}
function openExternal(url, label){
  try{ const w=window.open(url,'_blank','noopener'); if(!w){ location.href=url; } }
  catch(e){ try{ location.href=url; }catch(_){} }
  if(label) toast('Abriendo '+label+'…');
}
function waFrom(contact, msg){
  const raw=(contact||'').replace(/[^\d]/g,'');
  if(!raw) return waUrl(msg); // sin teléfono → cae al número del negocio
  const num = raw.length<=10 ? '54'+raw : raw;
  return 'https://wa.me/'+num+(msg?'?text='+encodeURIComponent(msg):'');
}

  const nf=$('#news-form'); if(nf) nf.onsubmit=(e)=>{ e.preventDefault(); const em=$('#news-email'); if(em&&em.value){ toast('¡Listo! Te suscribiste con '+em.value); em.value=''; } };
  // Galería → abrir pedido a medida (inspiración)
  $$('.gal-item').forEach(g=>g.onclick=()=>{ State.storeView='catalog'; State.catalogFilters.cat='all'; window.scrollTo(0,0); render(); });
  // Contadores animados de la sección "Hefesto en números"
  animateStoreStats();

  // catalog filters
  $$('[data-fcat]').forEach(b=>b.onclick=()=>{ State.catalogFilters.cat=b.dataset.fcat; render(); });
  $$('[data-ftoggle]').forEach(s=>s.onclick=()=>{ State.catalogFilters[s.dataset.ftoggle]=!State.catalogFilters[s.dataset.ftoggle]; render(); });
  const sort=$('#cat-sort'); if(sort) sort.onchange=()=>{ State.catalogFilters.sort=sort.value; render(); };
  const pr=$('#f-price-range'); if(pr) pr.oninput=()=>{ State.catalogFilters.maxPrice=+pr.value; const lbl=pr.parentElement.querySelector('b'); if(lbl)lbl.textContent=fmt(+pr.value); };
  if(pr) pr.onchange=()=>{ State.catalogFilters.maxPrice=+pr.value; render(); };
  const mat=$('#f-material'); if(mat) mat.onchange=()=>{ State.catalogFilters.material=mat.value; render(); };
  const cf=$('[data-act="clear-filters"]'); if(cf) cf.onclick=()=>{ State.catalogFilters={cat:'all',sort:'rel',onlyNew:false,onlySale:false,maxPrice:50000,material:'all'}; render(); };

  // product detail
  let pq=1; const qd=$('[data-pd-dec]'),qi=$('[data-pd-inc]'),qa=$('[data-pd-add]');
  const pdProd=getProduct(State.selectedProduct)||PRODUCTS[0];
  let pdColor = $('#pd-colors') ? $('#pd-colors .color-swatch.on')?.dataset.color : (pdProd.colorMode==='multi' ? 'Multicolor' : null);
  function pdBasePrice(){ return priceOf(pdProd); }
  function updatePdPrice(){
    const box=$('#pd-price'); if(!box) return;
    const sur = pdColor ? colorSurcharge(pdProd, pdColor) : 0;
    const base = pdBasePrice(); const tot = base + sur;
    const off = pdProd.sale ? Math.round((1-pdProd.sale/pdProd.price)*100) : 0;
    box.innerHTML = pdProd.sale
      ? `<span class="display" style="font-size:36px;color:var(--gold-bright)">${fmt(tot)}</span><span class="strike price" style="font-size:20px">${fmt(pdProd.price+sur)}</span>${badge('-'+off+'%','danger')}${sur?`<span class="faint" style="font-size:13px">(incluye ${sur>0?'+':''}${fmt(sur)} por color)</span>`:''}`
      : `<span class="display" style="font-size:36px">${fmt(tot)}</span>${sur?`<span class="faint" style="font-size:13px">(incluye ${sur>0?'+':''}${fmt(sur)} por color)</span>`:''}`;
  }
  $$('#pd-colors .color-swatch').forEach(sw=>sw.onclick=()=>{
    $$('#pd-colors .color-swatch').forEach(x=>x.classList.remove('on')); sw.classList.add('on');
    pdColor=sw.dataset.color; const sur=colorSurcharge(pdProd,pdColor);
    const lbl=$('#pd-color-label'); if(lbl) lbl.textContent=pdColor+(sur?` · ${sur>0?'+':''}${fmt(sur)}`:'');
    updatePdPrice();
  });
  if(qi) qi.onclick=()=>{ pq++; $('#pd-qty').textContent=pq; };
  if(qd) qd.onclick=()=>{ if(pq>1){pq--; $('#pd-qty').textContent=pq;} };
  if(qa) qa.onclick=()=>{ addToCart(qa.dataset.pdAdd,pq,pdColor); };
  const buy=$('[data-pd-buy]'); if(buy) buy.onclick=()=>{
    requireLogin(()=>{
      const c=currentCustomer();
      State.cart=[{id:buy.dataset.pdBuy,q:pq,...(pdColor?{color:pdColor}:{})}]; saveCart(); appliedCoupon=null;
      coStep=1; coData={ method:'pickup', zone:'', address:'', maps:'', pay:'mp', name:c?c.name.split(' ')[0]:'', last:c?c.name.split(' ').slice(1).join(' '):'', phone:c?(c.phone||''):'' };
      State.storeView='checkout'; window.scrollTo(0,0); render();
    });
  };
  $$('[data-thumb]').forEach(t=>t.onclick=()=>{ $$('[data-thumb]').forEach(x=>x.classList.remove('on')); t.classList.add('on'); });

  // checkout
  $$('#co-method [data-method]').forEach(b=>b.onclick=()=>{ coData.method=b.dataset.method; if(coData.method==='shipping'&&!coData.zone) coData.zone=STORE_CONFIG.shipping.zones[0].name; render(); });
  const zone=$('#co-zone'); if(zone) zone.onchange=()=>{ coData.zone=zone.value; render(); };
  const cad=$('#co-address'); if(cad) cad.oninput=()=>coData.address=cad.value;
  const cmp=$('#co-maps'); if(cmp) cmp.oninput=()=>coData.maps=cmp.value;
  $$('[data-pay]').forEach(l=>l.onclick=()=>{ coData.pay=l.dataset.pay; render(); });
  const next=$('[data-co-next]'); if(next) next.onclick=()=>{
    if(coStep===1){
      coData.name=$('#co-name')?.value.trim(); coData.last=$('#co-last')?.value.trim(); coData.phone=$('#co-phone')?.value.trim();
      if(!coData.name){ toast('Ingresá tu nombre','danger'); return; }
      if(coData.method==='shipping'){
        coData.address=$('#co-address')?.value.trim(); coData.maps=$('#co-maps')?.value.trim();
        if(!coData.address){ toast(coData.zone==='__out'?'Ingresá tu ciudad/localidad':'Ingresá tu dirección de entrega','danger'); return; }
      }
      coStep=2; window.scrollTo(0,0); render(); return;
    }
    if(coStep===2){
      const sub=cartSubtotal(); const total=Math.max(sub-couponDiscount(sub)+checkoutDelivery(),0);
      processPayment(coData.pay, total, ()=>{
        const orderId='HEF-'+(1043+ORDERS.length+Math.floor(Math.random()*40));
        const payLabel={mp:'MercadoPago',transfer:'Transferencia',cash:'Efectivo'}[coData.pay];
        const c=currentCustomer();
        const order={ id:orderId, customer:c.id, date:nowStamp(), status:'pendiente', pay:payLabel, track:'',
          note:(coData.method==='pickup'?'Retira en taller':(coData.zone==='__out'?'Envío a coordinar (fuera de '+STORE_CONFIG.shipping.city+', a cargo del comprador): '+coData.address:'Envío a '+coData.address+' ('+coData.zone+')')),
          items:State.cart.map(i=>({p:i.id,q:i.q,color:i.color})), total,
          delivery:{ method:coData.method, zone:coData.method==='shipping'?coData.zone:null, address:coData.address, maps:coData.maps, shipCost:checkoutDelivery(), payLabel },
          history:[['pendiente',nowStamp()]], filamentConsumed:false };
        ORDERS.unshift(order);
        coData.orderNum=orderId;
        State.cart=[]; saveCart(); appliedCoupon=null;
        pushNotif({ic:'cart',c:'gold',t:'Nuevo pedido '+orderId,d:c.name+' · '+fmt(total)});
        coStep=3; window.scrollTo(0,0); render();
      });
    }
  };
  const back=$('[data-co-back]'); if(back) back.onclick=()=>{ if(coStep===1){State.storeView='catalog';} else coStep--; render(); };

  // account
  $$('[data-go-order2]').forEach(b=>b.onclick=()=>{
    if(Auth.user && Auth.user.role==='cliente'){ openClientOrder(b.dataset.goOrder2); }
    else { State.mode='admin'; State.view='pedidos'; render(); setTimeout(()=>openOrderDetail(b.dataset.goOrder2),100); }
  });
  // mis pedidos
  const gp=$('[data-act="goto-points"]'); if(gp) gp.onclick=()=>{ accountTab='puntos'; State.storeView='account'; window.scrollTo(0,0); render(); };
  $$('[data-track-order]').forEach(b=>b.onclick=()=>openClientOrder(b.dataset.trackOrder,'track'));
  $$('[data-chat-order]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); openClientOrder(b.dataset.chatOrder,'chat'); });
  $$('[data-review]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); openReviewModal(b.dataset.review); });
  $$('[data-edit-review]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); openReviewModal(b.dataset.editReview); });
  $$('[data-reorder]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); const o=ORDERS.find(x=>x.id===b.dataset.reorder); if(o){ o.items.forEach(it=>{ const l=State.cart.find(i=>i.id===it.p); if(l)l.q+=it.q; else State.cart.push({id:it.p,q:it.q}); }); saveCart(); render(); toast('Productos agregados al carrito'); setTimeout(openCart,80); } });
  const sa=$('[data-act="save-account"]'); if(sa) sa.onclick=()=>toast('Datos actualizados');
  if(State.storeView==='account') wireAccount();

  // reset checkout step when leaving
  if(State.storeView!=='checkout' && coStep===3) coStep=1;
  const waf=$('[data-act="wa-float"]'); if(waf) waf.onclick=()=>openExternal(waUrl('¡Hola Hefesto! Quería hacerles una consulta.'), 'WhatsApp');
  const cpol=$('[data-act="co-policies"]'); if(cpol) cpol.onclick=openHefPolicies;
  // Botón volver arriba
  const tt=$('#to-top');
  if(tt){
    tt.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
    if(window.__ttScroll) window.removeEventListener('scroll', window.__ttScroll);
    window.__ttScroll=()=>{ if(window.scrollY>520) tt.classList.add('show'); else tt.classList.remove('show'); };
    window.addEventListener('scroll', window.__ttScroll, {passive:true});
    window.__ttScroll();
  }
  $$('[data-act="foot-wa"]').forEach(b=>b.onclick=()=>openExternal(waUrl('¡Hola Hefesto! Quería hacerles una consulta.'), 'WhatsApp'));
  $$('[data-act="foot-ig"]').forEach(b=>b.onclick=()=>openExternal(igUrl(), 'Instagram'));
  $$('[data-act="foot-mail"]').forEach(b=>b.onclick=()=>openExternal('mailto:'+(STORE_CONFIG.brand.email||''), 'correo'));
  $$('[data-act="foot-maps"]').forEach(b=>b.onclick=()=>openExternal(mapsUrl(), 'Google Maps'));
  const fenv=$('[data-act="foot-envios"]'); if(fenv) fenv.onclick=()=>openInfoModal('Envíos y devoluciones',[['Envíos','Realizamos envíos dentro de Puerto Iguazú. Para otras ciudades, el cliente coordina y abona el envío.'],['Retiro en taller','Gratis · Av. Corrientes 3247. Te avisamos cuando esté listo.'],['Devoluciones','Aceptamos cambios y devoluciones dentro de los 30 días en productos sin uso.'],['Pedidos a medida','Los productos personalizados no tienen devolución, pero acordamos todo por chat antes de imprimir.']]);
  const ffaq=$('[data-act="foot-faq"]'); if(ffaq) ffaq.onclick=()=>openInfoModal('Preguntas frecuentes',[['¿Cuánto tarda mi pedido?','Todo se imprime a pedido. El tiempo de producción figura en cada producto (24-48 hs en general).'],['¿Puedo elegir el color?','Sí, muchos productos permiten elegir color o combinación. Lo ves en la página del producto.'],['¿Hacen diseños personalizados?','¡Sí! Usá "Pedí algo a medida" y mandanos tu idea o archivo. Coordinamos por chat.'],['¿Qué medios de pago aceptan?','MercadoPago, transferencia y efectivo (al retirar).']]);
  const fcustom=$('[data-act="foot-custom"]'); if(fcustom) fcustom.onclick=()=>{ if(typeof openCustomRequest==='function') openCustomRequest(); else { State.storeView='home'; render(); } };
  const fterms=$('[data-act="foot-terms"]'); if(fterms) fterms.onclick=openHefPolicies;
  const fpriv=$('[data-act="foot-priv"]'); if(fpriv) fpriv.onclick=()=>openInfoModal('Política de privacidad',[['Tus datos','Usamos tus datos solo para procesar pedidos y contactarte. No los compartimos con terceros.']]);
}

function refreshAccountPanel(){
  const c=currentCustomer();
  const panel=$('#acc-panel'); if(panel){ panel.innerHTML=accountPanel(accountTab,c); }
  $$('.acc-navitem[data-acctab]').forEach(b=>b.classList.toggle('active', b.dataset.acctab===accountTab));
  wireAccount();
}
function wireAccount(){
  $$('[data-acctab]').forEach(b=>b.onclick=()=>{ accountTab=b.dataset.acctab; refreshAccountPanel(); });
  // rewire shared store handlers inside the panel
  $$('#acc-panel [data-snav]').forEach(a=>a.onclick=()=>{ State.storeView=a.dataset.snav; window.scrollTo(0,0); render(); });
  $$('#acc-panel [data-track-order]').forEach(b=>b.onclick=()=>openClientOrder(b.dataset.trackOrder,'track'));
  $$('#acc-panel [data-go-order2]').forEach(b=>b.onclick=()=>openClientOrder(b.dataset.goOrder2,'track'));
  $$('#acc-panel [data-sprod]').forEach(c2=>c2.onclick=(e)=>{ if(e.target.closest('[data-fav],[data-addcart]'))return; State.selectedProduct=c2.dataset.sprod; State.storeView='product'; window.scrollTo(0,0); render(); });
  $$('#acc-panel [data-addcart]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); addToCart(b.dataset.addcart); });
  $$('#acc-panel [data-fav]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); const id=b.dataset.fav; State.wishlist=State.wishlist.filter(x=>x!==id); saveWish(); updateWishBadge(); refreshAccountPanel(); });
  $$('#acc-panel [data-edit-review]').forEach(b=>b.onclick=()=>openReviewModal(b.dataset.editReview));
  $$('#acc-panel [data-acc-req]').forEach(b=>b.onclick=()=>openClientRequest(b.dataset.accReq));
  $$('#acc-panel [data-act="acc-new-custom"]').forEach(b=>b.onclick=openCustomRequest);
  wireAccChat();
  const c=currentCustomer(); const ad=accountData(c.id);

  const lo=$('[data-act="acc-logout"]'); if(lo) lo.onclick=logout;
  // perfil
  const sp=$('[data-act="acc-save-profile"]'); if(sp) sp.onclick=()=>{ c.name=$('#ac-name').value.trim()||c.name; c.email=$('#ac-email').value.trim(); c.phone=$('#ac-phone').value.trim(); c.city=$('#ac-city').value.trim(); toast('Datos actualizados'); render(); };
  const cp=$('[data-act="acc-pass"]'); if(cp) cp.onclick=()=>toast('Contraseña actualizada');
  $$('[data-pref]').forEach(s=>s.onclick=function(){ this.classList.toggle('on'); ad.prefs[this.dataset.pref]=this.classList.contains('on'); });
  // direcciones
  const aa=$('[data-act="add-address"]'); if(aa) aa.onclick=()=>openAddressModal(c.id);
  $$('[data-addr-edit]').forEach(b=>b.onclick=()=>openAddressModal(c.id, b.dataset.addrEdit));
  $$('[data-addr-del]').forEach(b=>b.onclick=()=>{ ad.addresses=ad.addresses.filter(a=>a.id!==b.dataset.addrDel); refreshAccountPanel(); toast('Dirección eliminada','danger'); });
  $$('[data-addr-def]').forEach(b=>b.onclick=()=>{ ad.addresses.forEach(a=>a.def=a.id===b.dataset.addrDef); refreshAccountPanel(); toast('Dirección principal actualizada'); });
  // pagos
  const ac=$('[data-act="add-card"]'); if(ac) ac.onclick=()=>openCardModal(c.id);
  $$('[data-card-del]').forEach(b=>b.onclick=()=>{ ad.cards=ad.cards.filter(x=>x.id!==b.dataset.cardDel); refreshAccountPanel(); toast('Tarjeta eliminada','danger'); });
  $$('[data-card-def]').forEach(b=>b.onclick=()=>{ ad.cards.forEach(x=>x.def=x.id===b.dataset.cardDef); refreshAccountPanel(); toast('Tarjeta principal actualizada'); });
  // puntos / recompensas
  $$('[data-redeem]').forEach(b=>b.onclick=()=>{ const r=REWARDS.find(x=>x.id===b.dataset.redeem); if(r) confirmRedeem(c, r); });
  $$('[data-copy-voucher]').forEach(b=>b.onclick=()=>{ if(navigator.clipboard) navigator.clipboard.writeText(b.dataset.copyVoucher).catch(()=>{}); toast('Código copiado: '+b.dataset.copyVoucher); });
}

function confirmRedeem(c, r){
  const ad=accountData(c.id); const bal=pointsBalance(c);
  if(bal<r.cost){ toast('No tenés puntos suficientes','danger'); return; }
  openModal(`<div class="modal-body" style="text-align:center;padding:32px 28px">
    <div class="kpi-ic" style="width:60px;height:60px;margin:0 auto 18px;background:rgba(var(--gold-rgb),.14);color:var(--gold-bright)">${icon(r.ic)}</div>
    <div class="section-title" style="font-size:19px;margin-bottom:6px">Canjear "${r.title}"</div>
    <div class="muted" style="font-size:13.5px;max-width:340px;margin:0 auto 18px">${r.desc}</div>
    <div class="card" style="padding:14px;max-width:260px;margin:0 auto;display:flex;justify-content:space-between;align-items:center">
      <span class="faint" style="font-size:12.5px">Costo</span><b style="color:var(--gold-bright)">${r.cost} pts</b>
    </div>
    <div class="faint" style="font-size:12px;margin-top:10px">Te quedarán ${bal-r.cost} pts</div>
    <div class="row gap-3 center" style="margin-top:22px">
      <button class="btn btn-secondary" data-act="cancel">Cancelar</button>
      <button class="btn btn-primary" data-act="confirm">${icon('check')} Confirmar canje</button>
    </div>
  </div>`);
  $('[data-act="cancel"]').onclick=closeModal;
  $('[data-act="confirm"]').onclick=()=>{
    ad.redeemed += r.cost;
    let code=null;
    if(r.type==='discount'){
      code='HEF'+Math.random().toString(36).slice(2,7).toUpperCase();
      const isPct=typeof r.value==='string' && r.value.includes('%');
      COUPONS.unshift({ id:'cp'+uid(), code, type:isPct?'pct':'fixed', value:isPct?parseInt(r.value):r.value, uses:'single', used:0, limit:1, expires:'2026-12-31', status:'activo', desc:r.title+' (canje de puntos)' });
    } else if(r.type==='shipping'){
      code='ENVIOHEF'+Math.random().toString(36).slice(2,5).toUpperCase();
      COUPONS.unshift({ id:'cp'+uid(), code, type:'fixed', value:5000, uses:'single', used:0, limit:1, expires:'2026-12-31', status:'activo', desc:'Envío gratis (canje de puntos)' });
    } else if(r.type==='product'){
      const p=getProduct(r.productId); if(p){ const l=State.cart.find(i=>i.id===p.id); if(l)l.q++; else State.cart.push({id:p.id,q:1,gift:true}); saveCart(); }
    }
    ad.vouchers.unshift({ title:r.title, ic:r.ic, code, at:new Date().toLocaleDateString('es-AR',{day:'numeric',month:'short'}) });
    closeModal(); refreshAccountPanel(); render();
    accountTab='puntos'; State.storeView='account'; render();
    toast(r.type==='product'?'¡Producto sumado a tu carrito!':'¡Beneficio canjeado! Código: '+code);
  };
}

function openAddressModal(cid, addrId){
  const ad=accountData(cid); const a=addrId?ad.addresses.find(x=>x.id===addrId):{label:'',name:'',street:'',city:'',zip:'',phone:''};
  const edit=!!addrId;
  openModal(`
    <div class="modal-head"><div><div class="eyebrow">${edit?'Editar':'Nueva'}</div><div class="section-title">${edit?'Editar dirección':'Agregar dirección'}</div></div><button class="icon-btn" data-act="close">${icon('x')}</button></div>
    <div class="modal-body col gap-4">
      <div class="grid-2" style="gap:12px"><div class="field"><label>Etiqueta</label><input class="input" id="ad-label" value="${a.label}" placeholder="Casa, Trabajo..."/></div><div class="field"><label>Destinatario</label><input class="input" id="ad-name" value="${a.name}" placeholder="Nombre completo"/></div></div>
      <div class="field"><label>Dirección</label><input class="input" id="ad-street" value="${a.street}" placeholder="Calle, número, piso, depto"/></div>
      <div class="grid-2" style="gap:12px"><div class="field"><label>Ciudad</label><input class="input" id="ad-city" value="${a.city}" placeholder="Ciudad"/></div><div class="field"><label>Código postal</label><input class="input" id="ad-zip" value="${a.zip}" placeholder="CP"/></div></div>
      <div class="field"><label>Teléfono de contacto</label><input class="input" id="ad-phone" value="${a.phone}" placeholder="+54 11 ..."/></div>
      <div class="auth-err hide" id="ad-err">${icon('alert')}<span></span></div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" data-act="close">Cancelar</button><button class="btn btn-primary" data-act="save">${icon('check')} ${edit?'Guardar':'Agregar dirección'}</button></div>
  `);
  $$('[data-act="close"]').forEach(b=>b.onclick=closeModal);
  $('[data-act="save"]').onclick=()=>{
    const label=$('#ad-label').value.trim(), street=$('#ad-street').value.trim();
    if(!label||!street){ const e=$('#ad-err'); e.classList.remove('hide'); e.querySelector('span').textContent='Completá etiqueta y dirección'; return; }
    const data={ label, name:$('#ad-name').value.trim(), street, city:$('#ad-city').value.trim(), zip:$('#ad-zip').value.trim(), phone:$('#ad-phone').value.trim() };
    if(edit){ Object.assign(a,data); } else { ad.addresses.push({ id:uid(), ...data, def:ad.addresses.length===0 }); }
    closeModal(); refreshAccountPanel(); toast(edit?'Dirección actualizada':'Dirección agregada');
  };
}

function payCustomRequest(id){
  const r=CUSTOM_REQ.find(x=>x.id===id); if(!r||!r.quote) return;
  openCheckoutModal({ title:r.quote.name, amount:r.quote.price, onPaid:(co)=>finalizeCustomOrder(id, co) });
}

function finalizeCustomOrder(id, co){
  const r=CUSTOM_REQ.find(x=>x.id===id); if(!r||!r.quote) return;
  const c=currentCustomer();
  const orderId='HEF-'+(1043+ORDERS.length+Math.floor(Math.random()*40));
  const total=r.quote.price + (co.shipCost||0);
  const order={ id:orderId, customer:c.id, date:nowStamp(), status:'produccion', pay:co.payLabel, track:'',
    note:'Pedido a medida: '+r.quote.name+(co.method==='pickup'?' · Retira en local':' · Envío a '+co.zone),
    items:[{ p:'custom', q:1 }], custom:{ name:r.quote.name, price:r.quote.price, material:r.quote.material, color:r.quote.color },
    delivery:co, total, history:[['pendiente',r.at],['produccion',nowStamp()]], filamentConsumed:false };
  ORDERS.unshift(order);
  r.status='cerrada'; r.quote.orderId=orderId; saveCustReq();
  const deliveryMsg = co.method==='pickup'
    ? 'Cuando esté listo lo retirás en '+STORE_CONFIG.shipping.storeAddress+'.'
    : 'Te lo enviamos a '+co.address+' ('+co.zone+').';
  reqChat(id).push({from:'shop',name:'Hefesto 3D',text:'¡Pago recibido! 🎉 Tu pedido '+orderId+' está confirmado y en producción. '+deliveryMsg,at:nowStamp()});
  saveCustReq();
  pushNotif({ic:'cart',c:'gold',t:'Pedido a medida pagado',d:r.name+' · '+orderId+' · '+calcMoney(total)});
  closeDrawer(); refreshAccountPanel();
  toast('¡Pago confirmado! Pedido '+orderId+' en producción');
}

/* Checkout reutilizable: método de entrega (retiro/envío Iguazú) + pago */
function openCheckoutModal({ title, amount, onPaid }){
  const sh=STORE_CONFIG.shipping;
  const state={ method:'pickup', zone:sh.zones[0].name, address:'', maps:'', shipCost:0, pay:'mp' };
  const payOpts=[['mp','MercadoPago','Tarjetas, QR y cuotas','receipt'],['transfer','Transferencia','5% off adicional','dollar'],['cash','Efectivo','Al retirar en el local','tag']];
  function shipCost(){ if(state.method!=='shipping') return 0; if(amount>=sh.freeOver) return 0; const z=sh.zones.find(x=>x.name===state.zone); return z?z.price:0; }
  function total(){ return amount + shipCost(); }
  const render=()=>{
    const sc=shipCost();
    return `
    <div class="modal-head"><div><div class="eyebrow">Finalizar compra</div><div class="section-title">${title}</div></div><button class="icon-btn" data-act="close">${icon('x')}</button></div>
    <div class="modal-body col gap-4">
      <div class="field"><label>¿Cómo lo querés recibir?</label>
        <div class="row gap-2" id="co-method">
          <button class="chip ${state.method==='pickup'?'active':''}" data-method="pickup">${icon('store')} Retiro en el local</button>
          <button class="chip ${state.method==='shipping'?'active':''}" data-method="shipping">${icon('truck')} Envío a domicilio</button>
        </div>
      </div>
      <div id="co-delivery">
        ${state.method==='pickup'?`
          <div class="card" style="padding:15px">
            <div class="row gap-2" style="color:var(--gold-bright);margin-bottom:8px">${icon('home')}<b style="font-size:13px">${sh.storeName}</b></div>
            <div class="muted" style="font-size:13px;margin-bottom:10px">${sh.storeAddress}</div>
            <a href="${sh.storeMaps}" target="_blank" class="btn btn-secondary btn-sm">${icon('home')} Ver en Google Maps</a>
          </div>`:`
          <div class="card" style="padding:15px;background:rgba(217,164,65,.07);border-color:rgba(217,164,65,.25)">
            <div class="row gap-2" style="color:var(--warning);margin-bottom:8px">${icon('alert')}<b style="font-size:12.5px">Solo hacemos envíos dentro de ${sh.city}</b></div>
            <div class="field" style="margin-bottom:10px"><label>Zona / barrio de ${sh.city}</label>
              <select class="select" id="co-zone">${sh.zones.map(z=>`<option value="${z.name}" ${state.zone===z.name?'selected':''}>${z.name} · ${calcMoney(z.price)}</option>`).join('')}<option value="__out">Estoy fuera de ${sh.city}</option></select>
            </div>
            <div id="co-addr-wrap" style="${state.zone==='__out'?'display:none':''}">
              <div class="field" style="margin-bottom:10px"><label>Dirección de entrega</label><input class="input" id="co-address" value="${state.address}" placeholder="Calle, número, referencia"/></div>
              <div class="field"><label>Ubicación de Google Maps <span class="faint" style="font-weight:400">(opcional)</span></label><input class="input" id="co-maps" value="${state.maps}" placeholder="Pegá el link de tu ubicación"/></div>
            </div>
            ${state.zone==='__out'?`<div class="row gap-2" style="color:var(--danger);font-size:12.5px;align-items:flex-start">${icon('x')}<span>Por ahora no hacemos envíos fuera de ${sh.city}. Podés elegir <b>Retiro en el local</b>.</span></div>`:''}
          </div>`}
      </div>
      <div class="field"><label>Método de pago</label>
        <div class="col gap-2" id="co-pay">
          ${payOpts.map(([k,l,d,ic])=>`<label class="row between card" style="padding:13px 15px;cursor:pointer" data-pay="${k}"><div class="row gap-3"><div class="kpi-ic" style="width:36px;height:36px">${icon(ic)}</div><div><div style="font-weight:600;font-size:13.5px">${l}</div><div class="faint" style="font-size:12px">${d}</div></div></div><span class="f-radio ${state.pay===k?'on':''}" style="padding:0"><span class="rdot"></span></span></label>`).join('')}
        </div>
      </div>
      <div class="col gap-2" style="font-size:13.5px;padding-top:8px;border-top:1px solid var(--border)">
        <div class="row between muted"><span>Producto</span><span class="price">${calcMoney(amount)}</span></div>
        <div class="row between muted"><span>Envío${state.method==='shipping'&&amount>=sh.freeOver?' (gratis)':''}</span><span class="price">${state.method==='pickup'?'Gratis (retiro)':sc?calcMoney(sc):'Gratis'}</span></div>
        <div class="row between" style="font-size:18px;font-weight:700;padding-top:6px"><span>Total</span><span class="price" style="color:var(--gold-bright)">${calcMoney(total())}</span></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" data-act="close">Cancelar</button><button class="btn btn-primary" data-act="pay" ${state.method==='shipping'&&state.zone==='__out'?'disabled style="opacity:.5"':''}>${icon('dollar')} Pagar ${calcMoney(total())}</button></div>`;
  };
  const root=$('#modal-root');
  const draw=()=>{ root.innerHTML=`<div class="modal-backdrop open"><div class="modal">${render()}</div></div>`; wire(); };
  function wire(){
    const bk=$('.modal-backdrop',root); bk.addEventListener('click',e=>{ if(e.target===bk) closeModal(); });

      const payLabel={mp:'MercadoPago',transfer:'Transferencia',cash:'Efectivo'}[state.pay];
      const co={ method:state.method, zone:state.method==='shipping'?state.zone:null, address:state.method==='shipping'?state.address:null, maps:state.maps, shipCost:shipCost(), payLabel };
      processPayment(state.pay, total(), ()=>{ closeModal(); onPaid(co); });
    };
  }
  draw();

function qrSvg(){ let cells=''; for(let y=0;y<11;y++)for(let x=0;x<11;x++){ if((x*7+y*13+x*y)%3===0||((x<3||x>7)&&(y<3||y>7))) cells+=`<rect x="${x*9}" y="${y*9}" width="9" height="9"/>`; } return `<svg viewBox="0 0 99 99" width="130" height="130" style="background:#fff;border-radius:10px;padding:6px" fill="#0A0A0F">${cells}</svg>`; }

function openClientOrder(id, tab='track'){
  const o=ORDERS.find(x=>x.id===id); if(!o) return;
  const curIdx=STATUS_FLOW.indexOf(o.status);
  const flow = o.status==='cancelado' ? [['cancelado','current',o.history.find(h=>h[0]==='cancelado')?.[1]]] :
    STATUS_FLOW.map((s,i)=>{ const h=o.history.find(([hs])=>hs===s); return [s, i<curIdx?'done':i===curIdx?'current':'pending', h?h[1]:null]; });

  openDrawer(`
    <div class="row between" style="padding:18px 22px;border-bottom:1px solid var(--border)">
      <div><div class="eyebrow">Tu pedido</div><div class="row gap-2" style="align-items:center"><div class="section-title">${o.id}</div>${statusBadge(o.status)}</div></div>

    </div>
    <div class="tabs" style="padding:0 22px">

    </div>

    <!-- TRACK -->
    <div class="otab-panel ${tab==='track'?'':'hide'}" data-panel="track" style="flex:1;overflow-y:auto;padding:20px">
      <div class="col gap-5">
        ${readyMsg?`<div class="ready-banner" style="margin:0"><div class="row gap-3" style="align-items:center"><div class="rb-ic">${icon('package')}</div><div><div style="font-weight:700;font-size:14px">¡Listo para retirar!</div><div style="font-size:12.5px;opacity:.85">Av. Corrientes 3247, CABA · Lun a Sáb 10–19h</div></div></div></div>`:''}
        ${o.track?`<div class="card" style="padding:13px 15px"><div class="faint" style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Código de seguimiento</div><div class="row between"><b class="price">${o.track}</b><button class="btn btn-secondary btn-sm" data-act="copy-track">${icon('copy')} Copiar</button></div></div>`:''}
        <div>
          <div class="faint" style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px">Estado del pedido</div>
          <div class="timeline">
            ${flow.map(([s,state,ts])=>`<div class="tl-item tl-${state}"><div class="tl-dot">${icon(STATUSES[s].icon)}</div><div><div style="font-weight:600;font-size:13.5px">${STATUSES[s].label}</div><div class="faint" style="font-size:12px">${ts||(state==='pending'?'Pendiente':'')}</div></div></div>`).join('')}
          </div>
        </div>
        <div>
          <div class="faint" style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">Productos</div>
          <div class="col gap-2">
            ${o.items.map(it=>{const p=itemView(it,o);return `<div class="row gap-3 card" style="padding:10px 12px"><div class="ph" style="width:42px;height:42px" data-label=""></div><div class="grow"><div style="font-weight:600;font-size:13.5px">${p.name}${p.custom?' '+badge('A medida','gold'):''}</div><div class="faint" style="font-size:12px">${fmt(p.price)} × ${it.q}</div></div><b class="price">${fmt(p.price*it.q)}</b></div>`;}).join('')}
          </div>
          <div class="row between" style="padding:12px 4px 0;border-top:1px solid var(--border);margin-top:10px"><span style="font-weight:600">Total</span><b class="price" style="font-size:18px;color:var(--gold-bright)">${fmt(o.total)}</b></div>
        </div>
        <button class="btn btn-secondary btn-block" data-otab="chat">${icon('send')} ¿Dudas? Chateá con el taller</button>
      </div>
    </div>

    <!-- CHAT -->
    <div class="otab-panel ${tab==='chat'?'':'hide'}" data-panel="chat" style="flex:1;display:${tab==='chat'?'flex':'none'};flex-direction:column;min-height:0">
      <div class="chat-body" id="chat-body" style="flex:1;overflow-y:auto;padding:18px 20px">
        <div class="chat-day">Pedido ${o.id}</div>
        ${renderChat(id)}
      </div>
      <div class="chat-input">
        <input class="input" id="chat-text" placeholder="Escribí un mensaje..." autocomplete="off"/>
        <button class="btn btn-primary btn-icon" data-act="chat-send">${icon('send')}</button>
      </div>
    </div>
  `);
  $('[data-act="close-drawer"]').onclick=closeDrawer;
  const ct=$('[data-act="copy-track"]'); if(ct) ct.onclick=()=>toast('Código copiado: '+o.track);
  // tab switching
  $$('[data-otab]').forEach(b=>b.onclick=()=>{
    const t=b.dataset.otab;
    $$('.tab[data-otab]').forEach(x=>x.classList.toggle('active', x.dataset.otab===t));
    $$('[data-panel]').forEach(p=>{ const on=p.dataset.panel===t; p.classList.toggle('hide',!on); p.style.display=on?(t==='chat'?'flex':'block'):'none'; });
    if(t==='chat'){ const cb=$('#chat-body'); if(cb) cb.scrollTop=cb.scrollHeight; const ti=$('#chat-text'); if(ti) ti.focus(); }
  });
  // chat send
  const send=()=>{
    const inp=$('#chat-text'); const txt=inp.value.trim(); if(!txt) return;
    getChat(id).push({from:'client', text:txt, at:nowStamp()});
    inp.value=''; refreshChat(id);
    // auto-respuesta del taller
    setTimeout(()=>{
      const replies=['¡Gracias por tu mensaje! En un momento te respondemos. 🙌','Recibido. Déjame chequear el estado de tu pedido y te confirmo.','¡Perfecto! Cualquier cosa quedamos en contacto por acá.'];
      getChat(id).push({from:'shop', name:'Hefesto 3D', text:replies[Math.floor(Math.random()*replies.length)], at:nowStamp()});
      refreshChat(id);
    }, 1100);
  };
  const sb=$('[data-act="chat-send"]'); if(sb) sb.onclick=send;
  const ti=$('#chat-text'); if(ti) ti.onkeydown=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); send(); } };
  if(tab==='chat'){ const cb=$('#chat-body'); if(cb) cb.scrollTop=cb.scrollHeight; }
}

function renderChat(id){
  return getChat(id).map(m=>m.from==='shop'
    ? `<div class="chat-row shop"><div class="chat-av">${icon('printer')}</div><div><div class="chat-name">${m.name||'Hefesto 3D'}</div><div class="chat-bubble shop">${m.text}</div><div class="chat-time">${m.at}</div></div></div>`
    : `<div class="chat-row client"><div><div class="chat-bubble client">${m.text}</div><div class="chat-time" style="text-align:right">${m.at}</div></div></div>`
  ).join('');
}
function refreshChat(id){
  const cb=$('#chat-body'); if(!cb) return;
  cb.innerHTML=`<div class="chat-day">Pedido ${id}</div>`+renderChat(id);
  cb.scrollTop=cb.scrollHeight;
}

<script>

   ADMIN VIEW — Calculadora de costos 3D

// estado vivo del formulario
let CALC_INPUT = { nombre:'', cliente:'', material:'PLA', color:'Negro', gramos:'', horas:'', minutos:'', multiplicador:3, margin:200, presetId:'mp1', tierIdx:0, obs:'' };
let CALC_RESULT = null;
let CALC_EDIT_ID = null;
let calcHistSearch = '', calcHistSort = 'fecha';

function calcStatsData(){
  const h=CALC_HISTORY;
  const ganancias=h.reduce((a,x)=>a+(x.r.ganancia||0),0);
  const material=h.reduce((a,x)=>a+(+x.i.gramos||0),0);
  const horas=h.reduce((a,x)=>a+(x.r.horas||0),0);
  const avg=h.length?h.reduce((a,x)=>a+(x.r.mult||0),0)/h.length:0;
  const totalPrecio=h.reduce((a,x)=>a+(x.r.precioFinal||0),0);
  return { piezas:h.length, ganancias, material, horas, avg, totalPrecio };
}

  }
  const r=CALC_RESULT;
  const rows=[
    ['Costo material','box','#5A9CD9',r.material, r.precioKg?`${calcMoney(r.precioKg)}/kg`:''],
    ['Electricidad','bolt','#D9A441',r.electricidad,''],
    ['Desgaste impresora','printer','#9B7BD4',r.desgaste,''],
    ['Margen de error','alert','#D96A5A',r.margenError,''],

    <div class="row between" style="margin-bottom:16px"><div class="section-title">Desglose detallado</div><span class="faint" style="font-size:12px">${CALC_INPUT.nombre||'Sin nombre'} · ${r.horas.toFixed(1)} h</span></div>

        <div class="bd-bar"><div style="width:${Math.max(val/maxc*100,3)}%;background:${col}"></div></div>
      </div>`).join('')}
    </div>
    <div class="row between" style="padding:12px 4px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:18px">
      <span class="row gap-2" style="align-items:center;color:var(--text-dim);font-size:13.5px">${icon('dollar')} Costo total de producción</span>

    <div class="calc-final">
      <div class="row between" style="align-items:center;position:relative;z-index:2">

          <div class="cf-val">${calcMoney(r.precioFinal)}</div>

          <text x="18" y="18" text-anchor="middle" style="font-size:3.4px;font-weight:700;fill:var(--success);font-family:var(--font-display)">PRECIO</text>
          <text x="18" y="23" text-anchor="middle" style="font-size:2.6px;fill:var(--text-dim)">sugerido</text>

function calcHistTable(){
  let list=CALC_HISTORY.filter(x=>{ const q=calcHistSearch.toLowerCase(); return !q || (x.i.nombre||'').toLowerCase().includes(q) || (x.i.cliente||'').toLowerCase().includes(q); });
  if(calcHistSort==='precio') list=[...list].sort((a,b)=>b.r.precioFinal-a.r.precioFinal);
  else if(calcHistSort==='nombre') list=[...list].sort((a,b)=>(a.i.nombre||'').localeCompare(b.i.nombre||''));
  else list=[...list].sort((a,b)=>b.ts-a.ts);
  if(!list.length) return `<div class="empty" style="padding:40px">${icon('calculator')}<div>${calcHistSearch?'Sin resultados para tu búsqueda':'Todavía no guardaste cálculos'}</div>${calcHistSearch?'':'<div class="faint" style="font-size:13px;margin-top:4px">Calculá un presupuesto y guardalo para tenerlo acá.</div>'}</div>`;
  return `<div class="table-wrap" style="border:none"><table class="tbl">
    <thead><tr><th>Fecha</th><th>Pieza</th><th>Cliente</th><th>Material</th><th>Gramos</th><th>Horas</th><th>Costo</th><th>Precio final</th><th></th></tr></thead>
    <tbody>${list.map(x=>`<tr>
      <td class="muted" style="white-space:nowrap">${x.fecha}</td>
      <td><b>${x.i.nombre||'—'}</b></td>
      <td class="muted">${x.i.cliente||'—'}</td>
      <td><span class="row gap-2" style="align-items:center;font-size:12.5px"><span style="width:11px;height:11px;border-radius:50%;background:${(FILAMENT_COLORS.find(c=>c.n===x.i.color)||{}).c||'#888'};border:1px solid rgba(255,255,255,.25)"></span>${x.i.material}</span></td>
      <td class="muted">${x.i.gramos||0} g</td>
      <td class="muted">${x.r.horas.toFixed(1)} h</td>
      <td class="price">${calcMoney(x.r.costoTotal)}</td>
      <td class="price"><b style="color:var(--success)">${calcMoney(x.r.precioFinal)}</b></td>
      <td><div class="row gap-1" style="justify-content:flex-end">
        <button class="btn-icon btn-ghost" data-calc-edit="${x.id}" title="Editar">${icon('edit')}</button>
        <button class="btn-icon btn-ghost" data-calc-dup="${x.id}" title="Duplicar">${icon('copy')}</button>
        <button class="btn-icon btn-ghost" data-calc-del="${x.id}" title="Eliminar">${icon('trash')}</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

VIEW_WIRE.calculadora = function(){
  // recompute live on any input
  const readInput=()=>{ const presetId=$('#ci-preset').value; const preset=(CALC_CFG.marginPresets||[]).find(x=>x.id===presetId);
    const tierIdx=+($('#ci-tier')?.value)||0;
    const tier = preset && preset.tiers ? (preset.tiers[tierIdx]||preset.tiers[0]) : null;
    const margin = tier ? tier.margin : 150;
    CALC_INPUT={
    nombre:$('#ci-nombre').value, cliente:$('#ci-cliente').value, material:$('#ci-material').value, color:$('#ci-color').value,
    gramos:$('#ci-gramos').value, horas:$('#ci-horas').value, minutos:$('#ci-minutos').value,
    presetId, tierIdx, margin, multiplicador:(1+margin/100), obs:$('#ci-obs').value }; };
  const live=()=>{ readInput(); updateFilHint(); if(CALC_RESULT){ CALC_RESULT=computeCalc(CALC_INPUT); $('#calc-breakdown').innerHTML=calcBreakdown(); wireBreakdown(); } };
  function updateFilHint(){ const h=$('#ci-filhint'); if(!h) return; const m=$('#ci-material').value, c=$('#ci-color').value;
    const f=FILAMENTS.find(x=>x.material===m&&x.color===c)||FILAMENTS.find(x=>x.material===m);
    h.innerHTML = f ? `${icon('layers')} Precio del filamento: <b style="color:var(--text)">${calcMoney(f.cost)}/kg</b> · stock ${f.stock>=1000?(f.stock/1000).toFixed(1)+' kg':f.stock+' g'}` : `${icon('alert')} <span style="color:var(--warning)">No tenés este material en inventario · agregalo en Filamentos</span>`;
  }
  ['#ci-nombre','#ci-cliente','#ci-material','#ci-color','#ci-horas','#ci-minutos','#ci-obs'].forEach(s=>{ const e=$(s); if(e) e.oninput=live; });
  $('#ci-material').onchange=live; $('#ci-color').onchange=live; updateFilHint();
  // gramos: slider + input sync
  const gr=$('#ci-gramos-r'), gi=$('#ci-gramos'), gv=$('#ci-gramos-v');
  if(gr) gr.oninput=()=>{ gi.value=gr.value; gv.textContent=gr.value+' g'; live(); };
  if(gi) gi.oninput=()=>{ gr.value=gi.value||0; gv.textContent=(gi.value||0)+' g'; live(); };
  const presetSel=$('#ci-preset'), tierSel=$('#ci-tier');
  function fillTiers(keepIdx){
    const p=(CALC_CFG.marginPresets||[]).find(x=>x.id===presetSel.value);
    const tiers=(p&&p.tiers)||[{minQty:1,margin:150}];
    tierSel.innerHTML=tiers.map((t,i)=>`<option value="${i}">${qtyTierLabel(t,tiers)}</option>`).join('');
    tierSel.value=Math.min(keepIdx||0, tiers.length-1);
  }
  fillTiers(CALC_INPUT.tierIdx||0);
  if(presetSel) presetSel.onchange=()=>{ fillTiers(0); live(); };
  if(tierSel) tierSel.onchange=live;

  $('[data-act="calc-run"]').onclick=()=>{
    readInput();
    if(!(+CALC_INPUT.gramos>0) && !(+CALC_INPUT.horas>0) && !(+CALC_INPUT.minutos>0)){ toast('Cargá gramos y/o tiempo de impresión','danger'); return; }
    CALC_RESULT=computeCalc(CALC_INPUT);
    const bd=$('#calc-breakdown'); bd.innerHTML=calcBreakdown(); wireBreakdown();
    bd.querySelector('.card').animate([{opacity:.3,transform:'translateY(8px)'},{opacity:1,transform:'none'}],{duration:350,easing:'cubic-bezier(.22,.61,.36,1)'});
    toast('Presupuesto calculado');
  };
  const ce=$('[data-act="calc-clear"]'); if(ce) ce.onclick=()=>{ CALC_INPUT={nombre:'',cliente:'',material:'PLA',color:'Negro',gramos:'',horas:'',minutos:'',multiplicador:3,margin:200,presetId:(CALC_CFG.marginPresets[0]||{}).id||'__custom',obs:''}; CALC_RESULT=null; CALC_EDIT_ID=null; $('#content').innerHTML=ViewCalculadora(); VIEW_WIRE.calculadora(); };
  const cc=$('[data-act="calc-cancel-edit"]'); if(cc) cc.onclick=()=>{ CALC_EDIT_ID=null; $('#content').innerHTML=ViewCalculadora(); VIEW_WIRE.calculadora(); };
  const cfg=$('[data-act="calc-config"]'); if(cfg) cfg.onclick=openCalcConfig;
  wireBreakdown();

  // historial
  const cs=$('#calc-search'); if(cs) cs.oninput=()=>{ calcHistSearch=cs.value; const pos=cs.selectionStart; $('#calc-hist-table').innerHTML=calcHistTable(); wireHist(); };
  const so=$('#calc-sort'); if(so) so.onchange=()=>{ calcHistSort=so.value; $('#calc-hist-table').innerHTML=calcHistTable(); wireHist(); };
  $('[data-act="calc-export-csv"]').onclick=()=>exportCalcCSV();
  $('[data-act="calc-export-pdf"]').onclick=()=>exportCalcPDF();
  wireHist();
};

function wireBreakdown(){
  const sv=$('[data-act="calc-save"]'); if(sv) sv.onclick=saveCalcToHistory;
  const cp=$('[data-act="calc-copy"]'); if(cp) cp.onclick=()=>{ if(navigator.clipboard&&CALC_RESULT) navigator.clipboard.writeText(calcMoney(CALC_RESULT.precioFinal)).catch(()=>{}); toast('Precio copiado'); };
}

function wireHist(){
  $$('[data-calc-edit]').forEach(b=>b.onclick=()=>{ const x=CALC_HISTORY.find(h=>h.id===b.dataset.calcEdit); if(!x)return; CALC_INPUT={...x.i}; CALC_RESULT=computeCalc(CALC_INPUT); CALC_EDIT_ID=x.id; $('#content').innerHTML=ViewCalculadora(); VIEW_WIRE.calculadora(); window.scrollTo(0,0); });
  $$('[data-calc-dup]').forEach(b=>b.onclick=()=>{ const x=CALC_HISTORY.find(h=>h.id===b.dataset.calcDup); if(!x)return; CALC_INPUT={...x.i, nombre:(x.i.nombre||'')+' (copia)'}; CALC_RESULT=computeCalc(CALC_INPUT); CALC_EDIT_ID=null; $('#content').innerHTML=ViewCalculadora(); VIEW_WIRE.calculadora(); window.scrollTo(0,0); toast('Cálculo duplicado · editá y guardá'); });
  $$('[data-calc-del]').forEach(b=>b.onclick=()=>{ CALC_HISTORY=CALC_HISTORY.filter(h=>h.id!==b.dataset.calcDel); saveCalcHist(); $('#content').innerHTML=ViewCalculadora(); VIEW_WIRE.calculadora(); toast('Cálculo eliminado','danger'); });
}

function saveCalcToHistory(){
  if(!CALC_RESULT){ toast('Calculá primero','danger'); return; }
  if(CALC_EDIT_ID){
    const x=CALC_HISTORY.find(h=>h.id===CALC_EDIT_ID);
    if(x){ x.i={...CALC_INPUT}; x.r=CALC_RESULT; toast('Cálculo actualizado'); }
    CALC_EDIT_ID=null;
  } else {
    CALC_HISTORY.unshift({ id:'calc'+uid(), ts:Date.now(), fecha:new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'2-digit'})+' '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}), i:{...CALC_INPUT}, r:CALC_RESULT });
    toast('Guardado en el historial');
  }
  saveCalcHist();
  $('#content').innerHTML=ViewCalculadora(); VIEW_WIRE.calculadora();
}
