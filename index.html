              ${(p.tiers||[]).map((t,j)=>`<div class="mp-tier" data-tier-row="${i}-${j}">
                <div class="mp-qty">
                  ${j===0?`<span class="mp-qty-label">Por unidad</span>`:`<span class="faint" style="font-size:12px">desde</span><input type="number" class="input mp-qty-in" data-tier-qty="${i}-${j}" value="${t.minQty}" min="2"/><span class="faint" style="font-size:12px">u.</span>`}
                  ${j===0?`<input type="hidden" data-tier-qty="${i}-${j}" value="1"/>`:''}
                </div>
                <div class="mp-margin-in"><span class="faint">+</span><input type="number" data-tier-margin="${i}-${j}" value="${t.margin}"/><span class="faint">%</span></div>
                ${j>0?`<button class="btn-icon btn-ghost btn-sm" data-tier-del="${i}-${j}" title="Quitar escalón">${icon('x')}</button>`:'<span class="mp-tier-spacer"></span>'}
              </div>`).join('')}
            </div>
            <button class="btn btn-ghost btn-sm mp-add-tier" data-tier-add="${i}">${icon('plus')} Agregar escalón por cantidad</button>
          </div>`).join('')}
        </div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" data-act="close">Cancelar</button><button class="btn btn-primary" data-act="save" style="background:linear-gradient(135deg,#5ed29a,#3fa46a);color:#0a1a10">${icon('check')} Guardar parámetros</button></div>
  `);
  $$('[data-act="close"]').forEach(b=>b.onclick=closeModal);
  const mpRerender=()=>{ saveCalcCfg(); openCalcConfig(); };
  function readPresets(){ CALC_CFG.marginPresets=(CALC_CFG.marginPresets||[]).map((p,i)=>{
    const tiers=(p.tiers||[]).map((t,j)=>({ minQty: j===0?1:(Math.max(2,+($('[data-tier-qty="'+i+'-'+j+'"]')?.value)||2)), margin:+($('[data-tier-margin="'+i+'-'+j+'"]')?.value)||0 }))
      .sort((a,b)=>a.minQty-b.minQty);
    return { id:p.id, name:($('[data-mp-name="'+i+'"]')?.value||'').trim()||'Tipo', tiers: tiers.length?tiers:[{minQty:1,margin:150}] };
  }); }
  $$('[data-mp-del]').forEach(b=>b.onclick=()=>{ readPresets(); CALC_CFG.marginPresets.splice(+b.dataset.mpDel,1); mpRerender(); });
  const mpa=$('[data-act="mp-add"]'); if(mpa) mpa.onclick=()=>{ readPresets(); CALC_CFG.marginPresets.push({id:'mp'+uid(),name:'Nuevo tipo',tiers:[{minQty:1,margin:150}]}); mpRerender(); };
  $$('[data-tier-add]').forEach(b=>b.onclick=()=>{ readPresets(); const p=CALC_CFG.marginPresets[+b.dataset.tierAdd]; const last=p.tiers[p.tiers.length-1]; p.tiers.push({minQty:(last?last.minQty:1)+10||10, margin:(last?last.margin:150)}); mpRerender(); });
  $$('[data-tier-del]').forEach(b=>b.onclick=()=>{ readPresets(); const [i,j]=b.dataset.tierDel.split('-').map(Number); CALC_CFG.marginPresets[i].tiers.splice(j,1); mpRerender(); });
  $('[data-act="save"]').onclick=()=>{
    CALC_CFG.precioKwh=+$('#cc-kwh').value||0;
    CALC_CFG.consumoWatts=+$('#cc-watts').value||0; CALC_CFG.vidaUtilHoras=+$('#cc-vida').value||1;
    CALC_CFG.costoMantenimiento=+$('#cc-mant').value||0; CALC_CFG.margenError=+$('#cc-error').value||0;
    CALC_CFG.moneda=$('#cc-moneda').value;
    readPresets();
    saveCalcCfg();
    if(CALC_RESULT) CALC_RESULT=computeCalc(CALC_INPUT);
    closeModal(); $('#content').innerHTML=ViewCalculadora(); VIEW_WIRE.calculadora(); toast('Parámetros guardados');
  };
}

function exportCalcCSV(){
  if(!CALC_HISTORY.length){ toast('No hay cálculos para exportar','danger'); return; }
  const head=['Fecha','Pieza','Cliente','Material','Color','Gramos','Horas','Costo material','Electricidad','Desgaste','Margen error','Costo total','Precio final'];
  const rows=CALC_HISTORY.map(x=>[x.fecha,x.i.nombre,x.i.cliente,x.i.material,x.i.color,x.i.gramos,x.r.horas.toFixed(2),Math.round(x.r.material),Math.round(x.r.electricidad),Math.round(x.r.desgaste),Math.round(x.r.margenError),Math.round(x.r.costoTotal),Math.round(x.r.precioFinal)]);
  const csv=[head,...rows].map(r=>r.map(c=>`"${(c??'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='hefesto-calculos.csv'; a.click(); URL.revokeObjectURL(url);
  toast('Excel/CSV exportado');
}
function exportCalcPDF(){
  if(!CALC_HISTORY.length){ toast('No hay cálculos para exportar','danger'); return; }
  const w=window.open('','_blank'); if(!w){ toast('Permití las ventanas emergentes','danger'); return; }
  const rows=CALC_HISTORY.map(x=>`<tr><td>${x.fecha}</td><td>${x.i.nombre||'—'}</td><td>${x.i.cliente||'—'}</td><td>${x.i.material}</td><td>${x.i.gramos||0} g</td><td>${x.r.horas.toFixed(1)} h</td><td>${calcMoney(x.r.costoTotal)}</td><td><b>${calcMoney(x.r.precioFinal)}</b></td></tr>`).join('');
  w.document.write(`<html><head><title>Hefesto 3D — Cálculos</title><style>body{font-family:Arial,sans-serif;padding:32px;color:#18181f}h1{color:#3fa46a}table{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px}th,td{text-align:left;padding:9px 10px;border-bottom:1px solid #ddd}th{background:#f4f4f0;text-transform:uppercase;font-size:10px;letter-spacing:.05em}</style></head><body><h1>Hefesto 3D — Historial de cálculos</h1><div>Generado ${new Date().toLocaleDateString('es-AR')}</div><table><thead><tr><th>Fecha</th><th>Pieza</th><th>Cliente</th><th>Material</th><th>Gramos</th><th>Horas</th><th>Costo</th><th>Precio final</th></tr></thead><tbody>${rows}</tbody></table><script>setTimeout(()=>window.print(),400)<\/script></body></html>`);
  w.document.close(); toast('Generando PDF...');
}
</script>

<script>
/* ===================================================================
   ADMIN VIEW — Filamentos (inventario de stock)
   =================================================================== */
let filView='grilla', filSearch='', filMat='all';

function ViewFilamentos(){
  const totalG = FILAMENTS.reduce((a,f)=>a+f.stock,0);
  const valorStock = FILAMENTS.reduce((a,f)=>a+(f.stock/1000)*f.cost,0);
  const bajos = FILAMENTS.filter(f=>filStatus(f)==='bajo').length;
  const agotados = FILAMENTS.filter(f=>filStatus(f)==='agotado').length;
  const mats=[...new Set(FILAMENTS.map(f=>f.material))];
  let list=FILAMENTS.filter(f=>filMat==='all'||f.material===filMat);
  if(filSearch){ const q=filSearch.toLowerCase(); list=list.filter(f=>(f.material+f.color+f.brand).toLowerCase().includes(q)); }

  return `<div class="view">
    <div class="page-head">
      <div><div class="eyebrow">Inventario</div><h1 class="page-title">Filamentos</h1>
      <div class="page-sub">${FILAMENTS.length} bobinas/colores · ${(totalG/1000).toFixed(1)} kg en stock · valor ${calcMoney(valorStock)}</div></div>
      <button class="btn btn-primary" data-act="new-fil">${icon('plus')} Nuevo filamento</button>
    </div>

    <div class="kpi-grid stagger" style="margin-bottom:22px">
      ${kpiCard({icon:'layers',label:'Carretes en stock',value:FILAMENTS.length,delta:'colores',up:true,tint:'#C9A84C'})}
      ${kpiCard({icon:'weight',label:'Material total',value:+(totalG/1000).toFixed(1),suf:' kg',dec:1,delta:'disponible',up:true,tint:'#4CB782'})}
      ${kpiCard({icon:'dollar',label:'Valor del inventario',value:valorStock,pre:(MONEDAS[CALC_CFG.moneda]||'$'),compact:true,delta:'estimado',up:true,tint:'#5A9CD9'})}
      ${kpiCard({icon:'alert',label:'Stock bajo / agotado',value:bajos+agotados,delta:agotados?agotados+' agotados':'a reponer',up:false,tint:'#D96A5A'})}
    </div>

    <div class="toolbar">
      <div class="search" style="width:240px">${icon('search')}<input class="input" id="fil-search" placeholder="Buscar material, color, marca..." value="${filSearch}"/></div>
      <button class="chip ${filMat==='all'?'active':''}" data-fmat="all">Todos</button>
      ${mats.map(m=>`<button class="chip ${filMat===m?'active':''}" data-fmat="${m}">${m}</button>`).join('')}
      <div class="grow"></div>
      <div class="mode-switch">
        <button class="${filView==='grilla'?'active':''}" data-fview="grilla" title="Grilla">${icon('grid')}</button>
        <button class="${filView==='lista'?'active':''}" data-fview="lista" title="Lista">${icon('list')}</button>
      </div>
    </div>

    ${list.length===0?`<div class="empty card section-card">${icon('layers')}<div>No hay filamentos con estos filtros.</div></div>`
      : filView==='grilla' ? `<div class="grid-3 stagger">${list.map(filCard).join('')}</div>` : filTable(list)}
  </div>`;
}

function filCard(f){
  const st=filStatus(f); const pct=Math.min(f.stock/(f.spool*3)*100,100);
  const stBadge = st==='ok'?badge('En stock','success',true):st==='bajo'?badge('Stock bajo','warning',true):badge('Agotado','danger',true);
  const spools=(f.stock/f.spool);
  return `<div class="card card-hover" style="padding:0;overflow:hidden" data-fil="${f.id}">
    <div style="height:6px;background:${filColor(f.color)}"></div>
    <div style="padding:18px">
      <div class="row between" style="margin-bottom:14px">
        <div class="row gap-3" style="align-items:center">
          <div class="spool" style="--spc:${filColor(f.color)}"><span></span></div>
          <div><div style="font-weight:700;font-size:15px">${f.material}</div><div class="faint" style="font-size:12px">${f.color} · ${f.brand}</div></div>
        </div>
        ${stBadge}
      </div>
      <div class="row between" style="font-size:12.5px;margin-bottom:6px"><span class="faint">Stock</span><b>${f.stock>=1000?(f.stock/1000).toFixed(2)+' kg':f.stock+' g'}</b></div>
      <div class="progress" style="height:7px"><div style="width:${Math.max(pct,3)}%;background:${st==='agotado'?'var(--danger)':st==='bajo'?'var(--warning)':'linear-gradient(90deg,var(--gold-deep),var(--gold-bright))'}"></div></div>
      <div class="faint" style="font-size:11px;margin-top:5px">≈ ${spools.toFixed(1)} carrete(s) de ${f.spool} g</div>
      <div class="row between" style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
        <span class="faint" style="font-size:12px">Costo ${calcMoney(f.cost)}/kg</span>
        <div class="row gap-1">
          <button class="btn btn-secondary btn-sm" data-fil-add="${f.id}" title="Sumar carrete">${icon('plus')} Carrete</button>
          <button class="btn-icon btn-ghost" data-fil-edit="${f.id}">${icon('edit')}</button>
        </div>
      </div>
    </div>
  </div>`;
}

function filTable(list){
  return `<div class="card"><div class="table-wrap" style="border:none"><table class="tbl">
    <thead><tr><th>Material</th><th>Color</th><th>Marca</th><th>Ø mm</th><th>Stock</th><th>Costo/kg</th><th>Estado</th><th></th></tr></thead>
    <tbody class="stagger">${list.map(f=>{ const st=filStatus(f); return `<tr data-fil="${f.id}">
      <td><b>${f.material}</b></td>
      <td><span class="row gap-2" style="align-items:center"><span style="width:13px;height:13px;border-radius:50%;background:${filColor(f.color)};border:1px solid rgba(255,255,255,.25)"></span>${f.color}</span></td>
      <td class="muted">${f.brand}</td>
      <td class="muted">${f.diameter}</td>
      <td><b>${f.stock>=1000?(f.stock/1000).toFixed(2)+' kg':f.stock+' g'}</b></td>
      <td class="price">${calcMoney(f.cost)}</td>
      <td>${st==='ok'?badge('En stock','success',true):st==='bajo'?badge('Bajo','warning',true):badge('Agotado','danger',true)}</td>
      <td><div class="row gap-1" style="justify-content:flex-end"><button class="btn-icon btn-ghost" data-fil-add="${f.id}" title="Sumar carrete">${icon('plus')}</button><button class="btn-icon btn-ghost" data-fil-edit="${f.id}">${icon('edit')}</button><button class="btn-icon btn-ghost" data-fil-del="${f.id}">${icon('trash')}</button></div></td>
    </tr>`;}).join('')}</tbody>
  </table></div></div>`;
}

VIEW_WIRE.filamentos = function(){
  $$('[data-count]').forEach(n=>animateCount(n,+n.dataset.count,{pre:n.dataset.pre,suf:n.dataset.suf,dec:+n.dataset.dec,compact:n.dataset.compact==='1'}));
  const s=$('#fil-search'); if(s) s.oninput=()=>{ filSearch=s.value; const pos=s.selectionStart; rerenderFil(); const ns=$('#fil-search'); if(ns){ns.focus();ns.setSelectionRange(pos,pos);} };
  $$('[data-fmat]').forEach(b=>b.onclick=()=>{ filMat=b.dataset.fmat; rerenderFil(); });
  $$('[data-fview]').forEach(b=>b.onclick=()=>{ filView=b.dataset.fview; rerenderFil(); });
  $$('[data-fil-edit]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); openFilamentModal(FILAMENTS.find(f=>f.id===b.dataset.filEdit)); });
  $$('[data-fil-del]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); FILAMENTS=FILAMENTS.filter(f=>f.id!==b.dataset.filDel); saveFilaments(); rerenderFil(); toast('Filamento eliminado','danger'); });
  $$('[data-fil-add]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); const f=FILAMENTS.find(x=>x.id===b.dataset.filAdd); if(f){ f.stock+=f.spool; saveFilaments(); rerenderFil(); toast('+1 carrete de '+f.spool+'g a '+f.material+' '+f.color); } });
  $$('[data-fil]').forEach(c=>c.onclick=()=>openFilamentModal(FILAMENTS.find(f=>f.id===c.dataset.fil)));
  const nf=$('[data-act="new-fil"]'); if(nf) nf.onclick=()=>openFilamentModal();
};
function rerenderFil(){ $('#content').innerHTML=ViewFilamentos(); VIEW_WIRE.filamentos(); }

function openFilamentModal(f=null){
  const edit=!!f;
  f=f||{material:'PLA',color:'Negro',brand:'Grilon3',diameter:'1.75',stock:'',spool:1000,cost:18000,alert:1000};
  openModal(`
    <div class="modal-head"><div><div class="eyebrow">${edit?'Editar':'Nuevo'}</div><div class="section-title">${edit?f.material+' · '+f.color:'Nuevo filamento'}</div></div><button class="icon-btn" data-act="close">${icon('x')}</button></div>
    <div class="modal-body col gap-4">
      <div class="grid-2">
        <div class="field"><label>Material</label><select class="select" id="fm-mat">${['PLA','PLA mate','PLA translúcido','PLA arcoíris','PETG','PETG reforzado','TPU','TPU + PLA','Resina','Resina 8K','ABS'].map(m=>`<option ${f.material===m?'selected':''}>${m}</option>`).join('')}</select></div>
        <div class="field"><label>Color</label><select class="select" id="fm-color">${FILAMENT_COLORS.map(fc=>`<option ${f.color===fc.n?'selected':''}>${fc.n}</option>`).join('')}</select></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Marca</label><select class="select" id="fm-brand">${FILAMENT_BRANDS.map(b=>`<option ${f.brand===b?'selected':''}>${b}</option>`).join('')}</select></div>
        <div class="field"><label>Diámetro (mm)</label><select class="select" id="fm-dia"><option ${f.diameter==='1.75'?'selected':''}>1.75</option><option ${f.diameter==='2.85'?'selected':''}>2.85</option><option ${f.diameter==='—'?'selected':''}>—</option></select></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Stock actual (g)</label><input class="input" id="fm-stock" type="number" value="${f.stock}" placeholder="0"/></div>
        <div class="field"><label>Tamaño del carrete (g)</label><input class="input" id="fm-spool" type="number" value="${f.spool}" placeholder="1000"/></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Costo por kg</label><input class="input" id="fm-cost" type="number" value="${f.cost}"/></div>
        <div class="field"><label>Alerta de stock bajo (g)</label><input class="input" id="fm-alert" type="number" value="${f.alert}"/></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" data-act="close">Cancelar</button><button class="btn btn-primary" data-act="save">${icon('check')} ${edit?'Guardar':'Agregar filamento'}</button></div>
  `);
  $$('[data-act="close"]').forEach(b=>b.onclick=closeModal);
  $('[data-act="save"]').onclick=()=>{
    const data={ material:$('#fm-mat').value, color:$('#fm-color').value, brand:$('#fm-brand').value, diameter:$('#fm-dia').value,
      stock:+$('#fm-stock').value||0, spool:+$('#fm-spool').value||1000, cost:+$('#fm-cost').value||0, alert:+$('#fm-alert').value||0 };
    if(edit){ Object.assign(f,data); } else { FILAMENTS.unshift({ id:'fl'+uid(), ...data }); }
    saveFilaments(); closeModal(); rerenderFil();
    if(PRICING.auto && edit){ const n=recalcStorePrices(); savePricing(); toast(n?'Filamento actualizado · '+n+' precios de la tienda recalculados':'Filamento actualizado'); }
    else toast(edit?'Filamento actualizado':'Filamento agregado');
  };
}
</script>

<script>
/* ===================================================================
   ADMIN VIEWS — Pedidos a medida + Impresiones fallidas
   =================================================================== */
let medidaSelId = null, medidaFilter = 'all';
function reqLastMsg(id){ const ch=reqChat(id); return ch[ch.length-1]||null; }
function reqNeedsReply(r){ const last=reqLastMsg(r.id); return r.status==='nueva' || (last && last.from==='client'); }
function ViewMedida(){
  const nuevas=CUSTOM_REQ.filter(r=>r.status==='nueva').length;
  const porResp=CUSTOM_REQ.filter(reqNeedsReply).length;
  let list=[...CUSTOM_REQ];
  if(medidaFilter==='reply') list=list.filter(reqNeedsReply);
  else if(medidaFilter==='nueva') list=list.filter(r=>r.status==='nueva');
  else if(medidaFilter==='presupuestada') list=list.filter(r=>r.status==='presupuestada');
  else if(medidaFilter==='cerrada') list=list.filter(r=>r.status==='cerrada');
  // ordenar: por responder primero
  list.sort((a,b)=> (reqNeedsReply(b)?1:0)-(reqNeedsReply(a)?1:0) || String(b.at||'').localeCompare(String(a.at||'')));
  const sel = list.find(r=>r.id===medidaSelId) || CUSTOM_REQ.find(r=>r.id===medidaSelId) || list[0] || null;
  const st = sel?REQ_STATUS[sel.status]:null;
  const counts={ all:CUSTOM_REQ.length, reply:porResp, nueva:nuevas, presupuestada:CUSTOM_REQ.filter(r=>r.status==='presupuestada').length, cerrada:CUSTOM_REQ.filter(r=>r.status==='cerrada').length };
  return `<div class="view">
    <div class="page-head">
      <div class="row gap-3"><div class="kpi-ic" style="background:rgba(var(--gold-rgb),.14);color:var(--gold-bright);width:48px;height:48px">${icon('sparkles')}</div>
      <div><div class="eyebrow">Solicitudes</div><h1 class="page-title">Pedidos a medida</h1>
      <div class="page-sub">${CUSTOM_REQ.length} conversaciones · <b style="color:var(--gold-bright)">${porResp} por responder</b></div></div></div>
    </div>

    <div class="toolbar" style="margin-bottom:16px">
      ${[['all','Todas'],['reply','Por responder'],['nueva','Nuevas'],['presupuestada','Presupuestadas'],['cerrada','Cerradas']].map(([k,l])=>`<button class="chip ${medidaFilter===k?'active':''}" data-mfilter="${k}">${l} <b style="opacity:.6">${counts[k]}</b></button>`).join('')}
    </div>

    ${CUSTOM_REQ.length===0?`<div class="empty card section-card">${icon('sparkles')}<div>Todavía no hay pedidos a medida.</div></div>`:`
    <div class="acc-chat med-chat">
      <div class="acc-chat-side med-side">
        ${list.length?`<div class="col gap-2">${list.map(r=>{ const s=REQ_STATUS[r.status]; const last=reqLastMsg(r.id); const reply=reqNeedsReply(r); return `<button class="acc-chat-conv ${sel&&r.id===sel.id?'on':''}" data-mconv="${r.id}">
          <div class="cavatar" style="width:40px;height:40px;font-size:15px;flex-shrink:0">${r.name[0]}</div>
          <div style="flex:1;min-width:0;text-align:left">
            <div class="row between" style="gap:6px"><b style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</b><span class="faint" style="font-size:10.5px;white-space:nowrap">${chatTime(last?last.at:r.at)}</span></div>
            <div class="row between" style="gap:6px"><span class="faint" style="font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1">${last?(last.from==='shop'?'Vos: ':'')+(last.text||'📷 Foto'):r.desc}</span>${reply?'<span class="med-badge">responder</span>':''}</div>
          </div>
        </button>`;}).join('')}</div>`:`<div class="faint" style="font-size:12.5px;padding:14px 4px;text-align:center">No hay conversaciones en este filtro.</div>`}
      </div>
      <div class="acc-chat-main med-main">
        ${sel?`
        <div class="chat-header">
          <div class="cavatar">${sel.name[0]}</div>
          <div class="grow"><div class="ch-name">${sel.name} ${badge(st.label,st.badge)}</div><div class="ch-status"><span class="live"></span> ${sel.contact}</div></div>
          <select class="select" id="med-status" style="width:auto;padding:7px 30px 7px 11px;font-size:12.5px">${Object.entries(REQ_STATUS).map(([k,v])=>`<option value="${k}" ${sel.status===k?'selected':''}>${v.label}</option>`).join('')}</select>
          <a class="chat-clip" href="${waFrom(sel.contact)}" target="_blank" rel="noopener" title="Abrir en WhatsApp">${icon('whatsapp')}</a>
        </div>
        <div style="padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface-1);display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          ${sel.budget?`<span class="badge badge-neutral">${icon('dollar')} Presupuesto cliente: ~${calcMoney(+sel.budget)}</span>`:''}
          ${sel.image?`<span class="badge badge-info">${icon('box')} Con foto de referencia</span>`:''}

function reqLastFromClient(id){ const ch=reqChat(id); return ch.length && ch[ch.length-1].from==='client'; }
function chatTime(at){ const m=String(at||'').match(/(\d{1,2}):(\d{2})/); return m?`${m[1].padStart(2,'0')}:${m[2]}`:''; }
function chatDateLabel(at){
  const d=String(at||'').slice(0,10); if(!d) return 'Hoy';
  const today=new Date().toISOString().slice(0,10);
  const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(d===today) return 'Hoy'; if(d===yest) return 'Ayer';
  const dt=new Date(d+'T00:00'); return isNaN(dt)?d:dt.toLocaleDateString('es-AR',{day:'numeric',month:'long'});
}
const CHAT_TICKS='<span class="chat-ticks read"><svg viewBox="0 0 18 11" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6l3 3 5.5-6.5"/><path d="M7.5 9l5.5-6.5"/></svg></span>';
function chatMeta(at, mine){ return `<span class="chat-meta">${chatTime(at)}${mine?CHAT_TICKS:''}</span>`; }

function renderReqChat(id, isAdmin){
  const r=CUSTOM_REQ.find(x=>x.id===id); if(!r) return '';
  // el primer "mensaje" es lo que pidió el cliente (texto + foto de referencia)
  const stream = [{ from:'client', text:r.desc, image:r.image, at:r.at, isReq:true }].concat(reqChat(id));
  let html='', prevDate='', prevFrom='';
  stream.forEach(m=>{
    const date=String(m.at||'').slice(0,10);
    if(date && date!==prevDate){ html+=`<div class="chat-day"><span>${chatDateLabel(m.at)}</span></div>`; prevDate=date; prevFrom=''; }
    const mine = isAdmin ? m.from==='shop' : m.from==='client';
    const newGroup = m.from!==prevFrom;
    const side = mine ? 'client' : 'shop';
    const avatar = mine ? '' : `<div class="chat-av ${newGroup?'':'hidden'}">${icon(isAdmin?'users':'printer')}</div>`;
    const img = m.image?`<div class="chat-img" style="background-image:url('${m.image}')" data-chat-img="${m.image}"></div>`:'';
    const budget = (m.isReq && r.budget) ? `<div style="font-size:11px;opacity:.7;margin-top:3px">Presupuesto sugerido: ~${calcMoney(+r.budget)}</div>` : '';
    const body = `${m.text?`<span>${m.text}</span>`:''}${budget}${img}${chatMeta(m.at, mine)}`;
    html += `<div class="chat-row ${side} ${newGroup?'group-gap':''}">${avatar}<div class="chat-bubble ${side}">${body}</div></div>`;
    prevFrom=m.from;
  });
  // indicador para el cliente: el taller está por responder
  if(!isAdmin){
    const last = (reqChat(id).slice(-1)[0]) || {from:'client'};
    const waiting = last.from==='client' || r.status==='nueva';
    if(waiting && r.status!=='cerrada'){
      html += `<div class="chat-row shop"><div class="chat-av">${icon('printer')}</div><div class="chat-bubble shop chat-typing"><span class="ct-dot"></span><span class="ct-dot"></span><span class="ct-dot"></span> <span style="font-size:11.5px;opacity:.7;margin-left:4px">Hefesto te responderá a la brevedad</span></div></div>`;
    }
  }
  return html;
}
function refreshReqChat(id){ const cb=$('#rchat-body'); if(!cb) return; cb.innerHTML=renderReqChat(id,true); cb.scrollTop=cb.scrollHeight; wireChatImgs(); }

    <div class="modal-foot"><button class="btn btn-secondary" data-act="close">Cancelar</button><button class="btn btn-primary" data-act="save">${icon('check')} ${edit?'Guardar':'Registrar falla'}</button></div>
  `);
  $$('[data-act="close"]').forEach(b=>b.onclick=closeModal);
  const dd=$('#fa-deduct'); if(dd) dd.onclick=function(){ this.classList.toggle('on'); };
  $('[data-act="save"]').onclick=()=>{
    const grams=+$('#fa-grams').value||0;
    const err=$('#fa-err'); if(grams<=0){ err.classList.remove('hide'); err.querySelector('span').textContent='Ingresá los gramos perdidos'; return; }
    const data={ piece:$('#fa-piece').value.trim(), material:$('#fa-mat').value, color:$('#fa-color').value, grams, reason:$('#fa-reason').value, notes:$('#fa-notes').value.trim() };
    if(edit){ Object.assign(f,data); }
    else {
      FAILS.unshift({ id:'fa'+uid(), ...data, at:nowStamp() });
      if($('#fa-deduct')&&$('#fa-deduct').classList.contains('on')){
        const fl=FILAMENTS.find(x=>x.material===data.material&&x.color===data.color)||FILAMENTS.find(x=>x.color===data.color);
        if(fl){ fl.stock=Math.max(0,fl.stock-grams); saveFilaments(); if(fl.stock<=fl.alert) pushNotif({ic:'alert',c:'warning',t:'Stock bajo: '+fl.material+' '+fl.color,d:'Quedan '+Math.round(fl.stock)+'g tras una falla'}); }
      }
    }
    saveFails(); closeModal(); $('#content').innerHTML=ViewFallas(); VIEW_WIRE.fallas(); toast(edit?'Falla actualizada':'Falla registrada');
  };
}
</script>

<script>
/* ===================================================================
   ADMIN VIEW — Categorías
   =================================================================== */
function ViewCategorias(){
  return `<div class="view">
    <div class="page-head">
      <div><div class="eyebrow">Catálogo</div><h1 class="page-title">Categorías</h1>
      <div class="page-sub">${CATEGORIES.length} categorías · se muestran en el home y se eligen al crear productos</div></div>
      <button class="btn btn-primary" data-act="new-cat">${icon('plus')} Nueva categoría</button>
    </div>
    ${CATEGORIES.length===0?`<div class="empty card section-card">${icon('grid')}<div>No hay categorías. Creá la primera.</div></div>`:`<div class="grid-3 stagger">
      ${CATEGORIES.map(c=>{ const n=PRODUCTS.filter(p=>p.cat===c.id).length; return `<div class="card card-hover" style="padding:0;overflow:hidden">
        <div style="height:6px;background:${c.color}"></div>
        <div style="padding:18px">
          <div class="row between" style="margin-bottom:14px">
            <div class="row gap-3" style="align-items:center"><div class="kpi-ic" style="width:46px;height:46px;background:${c.color}22;color:${c.color}">${icon(c.icon)}</div>
            <div><div style="font-weight:700;font-size:16px">${c.name}</div><div class="faint" style="font-size:12px">${n} ${n===1?'producto':'productos'}</div></div></div>
            <div class="row gap-1"><button class="btn-icon btn-ghost" data-cat-edit="${c.id}">${icon('edit')}</button><button class="btn-icon btn-ghost" data-cat-del="${c.id}">${icon('trash')}</button></div>
          </div>
        </div>
      </div>`;}).join('')}
    </div>`}
  </div>`;
}
VIEW_WIRE.categorias = function(){
  const nc=$('[data-act="new-cat"]'); if(nc) nc.onclick=()=>openCatModal();
  $$('[data-cat-edit]').forEach(b=>b.onclick=()=>openCatModal(CATEGORIES.find(c=>c.id===b.dataset.catEdit)));
  $$('[data-cat-del]').forEach(b=>b.onclick=()=>confirmDeleteCat(b.dataset.catDel));
};
function rerenderCats(){ $('#content').innerHTML=ViewCategorias(); VIEW_WIRE.categorias(); }

function confirmDeleteCat(id){
  const c=CATEGORIES.find(x=>x.id===id); if(!c) return;
  const n=PRODUCTS.filter(p=>p.cat===id).length;
  openModal(`<div class="modal-body" style="text-align:center;padding:32px">
    <div class="kpi-ic" style="width:54px;height:54px;margin:0 auto 16px;background:rgba(217,106,90,.12);color:var(--danger)">${icon('trash')}</div>
    <div class="section-title" style="margin-bottom:8px">¿Eliminar "${c.name}"?</div>
    <div class="muted" style="font-size:13.5px;max-width:340px;margin:0 auto">${n?`Hay ${n} producto(s) en esta categoría. Quedarán sin categoría asignada.`:'No se puede deshacer.'}</div>
    <div class="row gap-3 center" style="margin-top:24px"><button class="btn btn-secondary" data-act="cancel">Cancelar</button><button class="btn btn-danger" data-act="confirm">Eliminar</button></div>
  </div>`);
  $('[data-act="cancel"]').onclick=closeModal;
  $('[data-act="confirm"]').onclick=()=>{ const i=CATEGORIES.findIndex(x=>x.id===id); if(i>=0)CATEGORIES.splice(i,1); saveCats(); closeModal(); rerenderCats(); toast('Categoría eliminada','danger'); };
}

function openCatModal(c=null){
  const edit=!!c;
  c=c||{name:'',icon:'box',color:CAT_COLORS[0]};
  openModal(`
    <div class="modal-head"><div><div class="eyebrow">${edit?'Editar':'Nueva'}</div><div class="section-title">${edit?'Editar categoría':'Nueva categoría'}</div></div><button class="icon-btn" data-act="close">${icon('x')}</button></div>
    <div class="modal-body col gap-4">
      <div class="row gap-4" style="align-items:center">
        <div class="kpi-ic" id="cat-prev" style="width:54px;height:54px;background:${c.color}22;color:${c.color}">${icon(c.icon)}</div>
        <div class="field grow"><label>Nombre de la categoría</label><input class="input" id="cat-name" value="${(c.name||'').replace(/"/g,'&quot;')}" placeholder="Ej: Decoración"/></div>
      </div>
      <div class="field"><label>Ícono</label>
        <div class="row gap-2 wrap" id="cat-icons">${CAT_ICONS.map(ic=>`<button class="icon-pick ${c.icon===ic?'on':''}" data-cicon="${ic}">${icon(ic)}</button>`).join('')}</div>
      </div>
      <div class="field"><label>Color</label>
        <div class="row gap-2 wrap" id="cat-colors">${CAT_COLORS.map(col=>`<button class="color-pick ${c.color===col?'on':''}" data-ccolor="${col}" style="background:${col}"></button>`).join('')}</div>
      </div>
      <div class="auth-err hide" id="cat-err">${icon('alert')}<span></span></div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" data-act="close">Cancelar</button><button class="btn btn-primary" data-act="save">${icon('check')} ${edit?'Guardar':'Crear categoría'}</button></div>
  `);
  let selIcon=c.icon, selColor=c.color;
  const updatePrev=()=>{ const p=$('#cat-prev'); p.style.background=selColor+'22'; p.style.color=selColor; p.innerHTML=icon(selIcon); };
  $$('[data-act="close"]').forEach(b=>b.onclick=closeModal);
  $$('#cat-icons [data-cicon]').forEach(b=>b.onclick=()=>{ selIcon=b.dataset.cicon; $$('#cat-icons .icon-pick').forEach(x=>x.classList.toggle('on',x===b)); updatePrev(); });
  $$('#cat-colors [data-ccolor]').forEach(b=>b.onclick=()=>{ selColor=b.dataset.ccolor; $$('#cat-colors .color-pick').forEach(x=>x.classList.toggle('on',x===b)); updatePrev(); });
  $('[data-act="save"]').onclick=()=>{
    const name=$('#cat-name').value.trim();
    const err=$('#cat-err'); if(!name){ err.classList.remove('hide'); err.querySelector('span').textContent='Ingresá un nombre'; return; }
    if(edit){ c.name=name; c.icon=selIcon; c.color=selColor; }
    else { CATEGORIES.push({ id:'cat'+uid(), name, icon:selIcon, color:selColor }); }
    saveCats(); closeModal(); rerenderCats(); toast(edit?'Categoría actualizada':'Categoría creada');
  };
}
</script>
</body>
